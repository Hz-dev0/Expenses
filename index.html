<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f0d8d8">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <title>記帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --rose:   #e8b8b8;
      --roseDk: #c99090;
      --accent: #8c6f6f;
      --text:   #4a3a3a;
      --muted:  #a88888;
      --card:   #fff;
      --bg1:    #fdf6f6;
      --bg2:    #f7e8e8;
      --bdr:    rgba(220,170,170,0.25);
      --shd:    rgba(220,170,170,0.18);
      --danger: #e07070;
      --kb-h:   256px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html { background: var(--bg1); }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: linear-gradient(170deg, var(--bg1) 0%, var(--bg2) 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      padding-bottom: calc(var(--kb-h) + 8px);
    }

    /* ── TOP ── */
    #top {
      padding: max(env(safe-area-inset-top, 20px), 20px) 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mnav { display: flex; align-items: center; gap: 4px; }

    .mb {
      background: none;
      border: none;
      color: var(--rose);
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mb:active { background: rgba(220,170,170,0.18); }

    #mLabel {
      font-family: "Montserrat", sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .4px;
      color: var(--text);
      min-width: 90px;
      text-align: center;
    }

    #totalAmt {
      font-family: "Montserrat", sans-serif;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      color: var(--text);
      text-align: right;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: color .2s;
    }
    #totalAmt .cur {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0;
      vertical-align: 2px;
      margin-right: 1px;
    }
    #totalAmt.over {
      color: var(--danger);
      animation: overPulse .4s ease;
    }
    #totalAmt.over .cur { color: var(--danger); opacity: .7; }
    @keyframes overPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    #budgetHint {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--muted);
      text-align: right;
      margin-top: 1px;
      opacity: .6;
      line-height: 1;
    }
    #budgetHint.over { color: var(--danger); opacity: .85; }

    /* ── TABS ── */
    #tabs {
      display: flex;
      margin: 0 14px 10px;
      background: rgba(255,255,255,0.55);
      border-radius: 13px;
      border: 1px solid var(--bdr);
      overflow: hidden;
      padding: 3px;
      gap: 3px;
    }

    .tb {
      flex: 1;
      padding: 7px 0;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      border-radius: 10px;
      letter-spacing: .8px;
    }
    .tb.on { background: var(--rose); color: #fff; box-shadow: 0 2px 8px var(--shd); }

    /* ── SCROLL ── */
    #scrollArea { padding: 0; }

    /* ── LIST ── */
    .dg-head {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1.2px;
      padding: 10px 4px 5px;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .dg-head:active { opacity: .65; }
    .dg-arrow { margin-right: 4px; font-size: 9px; color: var(--rose); }

    .ri {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 6px;
      border: 1px solid var(--bdr);
      box-shadow: 0 2px 10px var(--shd);
      animation: fi .2s ease;
    }
    @keyframes fi {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }

    .ri-ico {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fdf0f0, #f5dede);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .ri-info  { flex: 1; min-width: 0; -webkit-user-select: none; user-select: none; cursor: pointer; }
    .ri-note  { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ri-cat   { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .ri-amt   { font-family: "Montserrat", sans-serif; font-size: 15px; font-weight: 800; white-space: nowrap; cursor: pointer; }
    .ri-amt small { font-size: 10px; color: var(--muted); font-weight: 500; margin-right: 1px; }
    .ri-amt.exempt { color: var(--muted); }
    .ri.exempt-row {
      background: repeating-linear-gradient(
        135deg,
        rgba(220,170,170,0.07) 0px,
        rgba(220,170,170,0.07) 8px,
        transparent 8px,
        transparent 16px
      );
      border-color: rgba(220,170,170,0.15);
      opacity: .72;
    }

    .ri-del {
      background: none;
      border: none;
      color: rgba(200,150,150,0.35);
      font-size: 13px;
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ri-del:active { color: var(--danger); background: rgba(224,112,112,0.1); }

    .empty     { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 13px; opacity: .65; }
    .empty-ico { font-size: 30px; margin-bottom: 8px; opacity: .4; }

    /* ── 分析 ── */
    #anaPanel { }

    .ana-total {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--bdr);
      box-shadow: 0 2px 10px var(--shd);
      padding: 16px;
      margin-bottom: 10px;
      text-align: center;
    }
    .ana-total-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 4px; }
    .ana-total-num {
      font-family: "Montserrat", sans-serif;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
    }
    .ana-total-num small { font-size: 14px; color: var(--muted); font-weight: 600; margin-right: 2px; }

    .ana-stack-wrap {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--bdr);
      box-shadow: 0 2px 10px var(--shd);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .stack-bar {
      height: 20px;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      margin-bottom: 10px;
      background: rgba(220,170,170,0.1);
    }
    .stack-seg { height: 100%; }

    .cat-card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--bdr);
      box-shadow: 0 2px 10px var(--shd);
      padding: 12px 14px;
      margin-bottom: 7px;
    }
    .cat-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .cat-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { flex: 1; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .cat-pct  { font-family: "Montserrat", sans-serif; font-size: 11px; color: var(--muted); font-weight: 700; }
    .cat-amt  { font-family: "Montserrat", sans-serif; font-size: 15px; font-weight: 800; color: var(--text); margin-left: 8px; }
    .cat-amt small { font-size: 10px; color: var(--muted); font-weight: 500; margin-right: 1px; }

    .bar-bg   { height: 6px; border-radius: 3px; background: rgba(220,170,170,0.12); }
    .bar-fill { height: 100%; border-radius: 3px; }
    .ana-empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; opacity: .6; }

    /* ── 浮動鍵盤 ── */
    #kb {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--kb-h);
      background: rgba(254,250,250,0.98);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--bdr);
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -4px 28px rgba(200,150,150,0.14);
      padding: 9px 12px max(env(safe-area-inset-bottom, 0px), 4px);
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 6px;
      z-index: 100;
    }

    .kb-r1 {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 2px;
    }

    #amtDisp {
      font-family: "Montserrat", sans-serif;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      grid-column: 1;
    }
    #amtDisp .cur { font-size: 12px; color: var(--muted); font-weight: 600; margin-right: 2px; vertical-align: 2px; }

    .ph { color: var(--rose) !important; opacity: .45; }
    .kb-cur {
      display: inline-block;
      width: 2px;
      height: 26px;
      background: var(--rose);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink .9s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    #saveBtn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      opacity: .55;
      transition: opacity .15s;
      grid-column: 2;
      justify-self: center;
    }
    #saveBtn:active { opacity: 1; }

    #dateLbl {
      font-family: "Noto Sans TC", sans-serif;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      text-align: right;
      white-space: nowrap;
      padding: 2px 0;
      border-bottom: 1px dashed rgba(168,136,136,0.4);
      grid-column: 3;
      justify-self: end;
    }
    #dateLbl:active { opacity: .6; }

    /* ── Panel wrap for swipe ── */
    #scrollArea {
      overflow: visible;
    }
    #panelClip {
      overflow: hidden;
      width: 100%;
    }
    #panelWrap {
      display: flex;
      width: 300%;
      transition: transform .32s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    #panelWrap.notransition { transition: none; }
    .swipe-panel {
      width: 33.333%;
      flex-shrink: 0;
      min-width: 0;
      padding: 0 14px;
      box-sizing: border-box;
    }

    .kb-r2 { display: flex; }

    .note-inp {
      flex: 1;
      border: 1.5px solid var(--bdr);
      border-radius: 50px;
      padding: 6px 13px;
      background: transparent;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 12px;
      color: var(--text);
      outline: none;
      -webkit-user-select: auto;
      user-select: auto;
    }
    .note-inp::placeholder { color: var(--muted); opacity: .7; }
    .note-inp:focus { border-color: var(--rose); }

    .kb-r3 { display: grid; grid-template-columns: repeat(3, 1fr) 46px; gap: 4px; }

    .nb {
      border-radius: 11px;
      border: 1.5px solid var(--bdr);
      background: rgba(230,180,180,0.07);
      font-family: "Montserrat", sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nb.pressed { background: var(--rose); color: #fff; border-color: var(--rose); }
    .nb.del { font-size: 15px; color: var(--muted); }
    .nb.del.pressed { background: rgba(200,150,150,0.15); color: var(--accent); border-color: transparent; }
    .nb.ok {
      background: linear-gradient(135deg, #ebb8b8, #d49898);
      color: #fff;
      border-color: transparent;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .4px;
      box-shadow: 0 3px 12px rgba(220,160,160,0.35);
    }
    .nb.ok.pressed { background: var(--accent); }

    .cbt {
      border-radius: 11px;
      border: 1.5px solid var(--bdr);
      background: rgba(235,185,185,0.08);
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 讓長按不觸發系統選單 */
      -webkit-touch-callout: none;
      touch-action: none;
      position: relative;
    }
    .cbt.on      { background: var(--rose); border-color: var(--rose); box-shadow: 0 2px 8px rgba(220,160,160,0.4); }
    .cbt.pressed { opacity: .65; }



    /* ── 重新命名 Modal ── */
    #renameOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(74,58,58,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    #renameOverlay.open { display: flex; }

    #renameBox {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 22px 18px;
      width: min(320px, calc(100vw - 40px));
      box-shadow: 0 8px 40px rgba(200,140,140,0.28);
      animation: popIn .18s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    #renameTitle {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 14px;
      text-align: center;
    }

    #renameInput {
      width: 100%;
      border: 1.5px solid var(--bdr);
      border-radius: 50px;
      padding: 9px 16px;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      text-align: center;
      background: var(--bg1);
      -webkit-user-select: auto;
      user-select: auto;
    }
    #renameInput:focus { border-color: var(--rose); }

    .rename-btns {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .rename-btns button {
      flex: 1;
      padding: 10px 0;
      border-radius: 50px;
      border: none;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    #renameCancelBtn { background: rgba(220,170,170,0.15); color: var(--muted); }
    #renameOkBtn     { background: linear-gradient(135deg, #ebb8b8, #d49898); color: #fff; }
    #renameCancelBtn:active { background: rgba(220,170,170,0.28); }
    #renameOkBtn:active     { background: var(--accent); }

    #totalModeTip {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 150;
    }
    #totalModeTip span {
      background: rgba(140,111,111,0.82);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      padding: 5px 14px;
      border-radius: 0 0 12px 12px;
      opacity: 0;
      transform: translateY(-100%);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
    }
    #totalModeTip span.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(var(--kb-h) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--accent);
      color: #fff;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    /* ── Budget Modal ── */
    #budgetOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(74,58,58,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    #budgetOverlay.open { display: flex; }

    #budgetBox {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 22px 18px;
      width: min(300px, calc(100vw - 40px));
      box-shadow: 0 8px 40px rgba(200,140,140,0.28);
      animation: popIn .18s ease;
    }

    #budgetTitle {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 6px;
      text-align: center;
    }

    #budgetInput {
      width: 100%;
      border: 1.5px solid var(--bdr);
      border-radius: 50px;
      padding: 9px 16px;
      font-family: "Montserrat", sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      outline: none;
      text-align: center;
      background: var(--bg1);
      -webkit-user-select: auto;
      user-select: auto;
    }
    #budgetInput:focus { border-color: var(--rose); }
    #budgetInput::-webkit-inner-spin-button,
    #budgetInput::-webkit-outer-spin-button { -webkit-appearance: none; }

    /* ── Month Picker Modal ── */
    #monthPickerOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(74,58,58,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    #monthPickerOverlay.open { display: flex; }

    #monthPickerBox {
      background: var(--card);
      border-radius: 20px;
      padding: 22px 20px 18px;
      width: min(320px, calc(100vw - 40px));
      box-shadow: 0 8px 40px rgba(200,140,140,0.28);
      animation: popIn .18s ease;
    }

    #monthPickerTitle {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 14px;
      text-align: center;
    }

    #mpYearRow {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
      margin-bottom: 14px;
    }

    #mpYearLabel {
      font-family: "Montserrat", sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--text);
      min-width: 60px;
      text-align: center;
    }

    .mp-arrow {
      background: none;
      border: 1.5px solid var(--bdr);
      color: var(--rose);
      font-size: 18px;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mp-arrow:active { background: rgba(220,170,170,0.18); }

    #mpMonthGrid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      margin-bottom: 4px;
    }

    .mp-m {
      padding: 8px 0;
      border-radius: 10px;
      border: 1.5px solid var(--bdr);
      background: rgba(235,185,185,0.08);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      text-align: center;
    }
    .mp-m.on { background: var(--rose); color: #fff; border-color: var(--rose); }
    .mp-m:active { opacity: .7; }

    /* ── Emoji Picker Modal ── */
    #emojiOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(74,58,58,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 300;
      align-items: flex-end;
      justify-content: center;
    }
    #emojiOverlay.open { display: flex; }

    #emojiBox {
      background: var(--card);
      border-radius: 22px 22px 0 0;
      padding: 18px 16px max(env(safe-area-inset-bottom, 0px), 16px);
      width: 100%;
      max-width: 480px;
      box-shadow: 0 -4px 32px rgba(200,140,140,0.22);
      animation: slideUp .2s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }
    #emojiTitle {
      font-size: 12px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 12px;
      text-align: center;
    }
    #emojiGrid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      max-height: 260px;

<script>
  /* ── 預設分類（支援自訂名稱） ── */
  const DEFAULT_CATS = {
    food:  { icon: '🍴', lbl: '食物'  },
    snack: { icon: '🍫', lbl: '零食'  },
    fun:   { icon: '✨', lbl: '娛樂'  },
    daily: { icon: '🧻', lbl: '日用品' },
  };
  const CKEYS  = Object.keys(DEFAULT_CATS);
  const CAT_C  = ['#e8b8b8', '#b8d4e8', '#b8e8cc', '#e8ddb8'];
  const SK      = 'kakeibo_v2';
  const SK_LBL  = 'kakeibo_labels';
  const SK_BDG  = 'kakeibo_budget';
  const SK_MODE = 'kakeibo_budget_mode';
  const IDB_NAME = 'kakeibo_db';
  const IDB_VER  = 1;
  const IDB_STORE = 'data';

  /* ── IndexedDB 層 ── */
  let _idb = null;

  function openIDB() {
    return new Promise((res, rej) => {
      if (_idb) { res(_idb); return; }
      const req = indexedDB.open(IDB_NAME, IDB_VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(IDB_STORE))
          db.createObjectStore(IDB_STORE);
      };
      req.onsuccess = e => { _idb = e.target.result; res(_idb); };
      req.onerror   = () => rej(req.error);
    });
  }

  function idbSet(key, val) {
    return openIDB().then(db => new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    })).catch(err => { console.error('[IDB] idbSet failed:', key, err); });
  }

  function idbGet(key) {
    return openIDB().then(db => new Promise((res, rej) => {
      const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    })).catch(() => null);
  }

  /* ── 工具函式（雙寫：IDB 主要 + localStorage 備份）── */

    idbSet(SK, v).catch(() => {});
    try { localStorage.setItem(SK, v); lsOk = true; } catch(e) {}
    // 兩邊都寫不進去才警告（idbSet 失敗已在 idbSet 內 console.error）
    if (!lsOk) {
      console.error('[save] localStorage also failed — storage may be full');
      toast('⚠️ 儲存失敗！請立即匯出備份');

  /* ── 讀取（優先 IDB，fallback localStorage，雙向補齊）── */
  async function loadAll() {
    // recs
    try {
      const idbVal = await idbGet(SK);
      const lsVal  = localStorage.getItem(SK);
      if (idbVal) {
        recs = JSON.parse(idbVal);
        if (!lsVal) { try { localStorage.setItem(SK, idbVal); } catch(e) {} } // IDB 有、LS 沒有 → 補 LS
      } else if (lsVal) {
        recs = JSON.parse(lsVal);
        idbSet(SK, lsVal); // LS 有、IDB 沒有 → 補 IDB（含遷移舊資料）
      }
    } catch(e) {
      try { const ls = localStorage.getItem(SK); if (ls) recs = JSON.parse(ls); } catch(e2) {}
    }
    // labels
    try {
      const idbVal = await idbGet(SK_LBL);
      const lsVal  = localStorage.getItem(SK_LBL);
      const v = idbVal || lsVal;
      if (v) {
        const saved = JSON.parse(v);
        CKEYS.forEach(k => { if (saved[k]) DEFAULT_CATS[k].lbl = saved[k]; });
        if (idbVal && !lsVal) { try { localStorage.setItem(SK_LBL, idbVal); } catch(e) {} }
        if (!idbVal && lsVal) { idbSet(SK_LBL, lsVal); }
      }
    } catch(e) {}
    // budget
    try {
      const idbVal = await idbGet(SK_BDG);
      const lsVal  = localStorage.getItem(SK_BDG);
      const v = idbVal ?? lsVal;
      if (v !== null && v !== undefined) budget = parseInt(v, 10) || 0;
      if (idbVal && !lsVal) { try { localStorage.setItem(SK_BDG, idbVal); } catch(e) {} }
      if (!idbVal && lsVal) { idbSet(SK_BDG, lsVal); }
    } catch(e) {}
    // icons
    try {
      const idbVal = await idbGet(SK_ICONS);
      const lsVal  = localStorage.getItem(SK_ICONS);
      const v = idbVal || lsVal;
      if (v) {
        const saved = JSON.parse(v);
        CKEYS.forEach(k => { if (saved[k]) DEFAULT_CATS[k].icon = saved[k]; });
        if (idbVal && !lsVal) { try { localStorage.setItem(SK_ICONS, idbVal); } catch(e) {} }
        if (!idbVal && lsVal) { idbSet(SK_ICONS, lsVal); }
      }
    } catch(e) {}
    // budget mode
    try {
      const idbVal = await idbGet(SK_MODE);
      const lsVal  = localStorage.getItem(SK_MODE);
      const v = idbVal ?? lsVal;
      if (v !== null && v !== undefined) showBudgetTotal = (v === '1');
      if (idbVal && !lsVal) { try { localStorage.setItem(SK_MODE, idbVal); } catch(e) {} }
      if (!idbVal && lsVal) { idbSet(SK_MODE, lsVal); }
    } catch(e) {}
    // bdgPlan
    try {
      const idbVal = await idbGet(SK_BDGPLAN);
      const lsVal  = localStorage.getItem(SK_BDGPLAN);
      const v = idbVal || lsVal;
      if (v) {
        const saved = JSON.parse(v);
        if (typeof saved === 'object' && !Array.isArray(saved)) {
          bdgPlan = saved;
          Object.values(bdgPlan).forEach(p => {
            (p.subs||[]).forEach(s => { if (s.id >= _subId) _subId = s.id + 1; });
          });
        }
        if (idbVal && !lsVal) { try { localStorage.setItem(SK_BDGPLAN, idbVal); } catch(e) {} }
        if (!idbVal && lsVal) { idbSet(SK_BDGPLAN, lsVal); }
      }
    } catch(e) {}
  }

  /* ── 長按偵測（touchstart / mousedown） ── */
  function setupLongPress() {
    const grid       = document.getElementById('kbGrid');
    let pressTimer   = null;
    let pressedBtn   = null;
    let didLongPress = false;

    // Double-tap detection for emoji picker
    let lastTapTime  = 0;
    let lastTapKey   = null;

    const startPress = (btn) => {
      didLongPress = false;
      pressedBtn   = btn;
      pressTimer   = setTimeout(() => {
        didLongPress = true;
        btn.classList.remove('pressed');
        openRename(btn.dataset.c);
      }, 480);
    };

    const cancelPress = () => {
      clearTimeout(pressTimer);
      pressTimer = null;
    };

    // Touch
    grid.addEventListener('touchstart', e => {
      const btn = e.target.closest('.cbt');
      if (!btn) return;
      startPress(btn);
    }, { passive: true });

    grid.addEventListener('touchend', e => {
      const btn = e.target.closest('.cbt');
      cancelPress();
      if (btn && !didLongPress) {
        e.preventDefault();
        const now = Date.now();
        const key = btn.dataset.c;
        if (now - lastTapTime < 350 && lastTapKey === key) {
          // double tap → emoji picker
          lastTapTime = 0;
          lastTapKey = null;
          openEmojiPicker(key);
          return;
        }
        lastTapTime = now;
        lastTapKey  = key;
        btn.classList.add('pressed');
        setTimeout(() => btn.classList.remove('pressed'), 90);
        sc(btn.dataset.c);
      }
    }, { passive: false });

    grid.addEventListener('touchmove', () => cancelPress(), { passive: true });
    grid.addEventListener('touchcancel', () => cancelPress(), { passive: true });

    // Mouse (桌機)
    grid.addEventListener('mousedown', e => {
      const btn = e.target.closest('.cbt');
      if (!btn) return;
      startPress(btn);
    });

    grid.addEventListener('mouseup', e => {
      const btn = e.target.closest('.cbt');
      cancelPress();
      if (btn && !didLongPress) sc(btn.dataset.c);
    });

    grid.addEventListener('dblclick', e => {
      const btn = e.target.closest('.cbt');
      if (!btn) return;
      openEmojiPicker(btn.dataset.c);
    });

    grid.addEventListener('mouseleave', () => cancelPress());
  }

  /* ── 預算規劃渲染 ── */
  function getBdgSpending() {
    // 本月各 catKey + subId 支出加總
    const mrs = getMrs();
    const out = {};
    mrs.forEach(r => {
      if (!r.bdgRef) return;
      const ck = r.bdgRef.catKey;
      out[ck] = (out[ck] || 0) + r.amt;
      if (r.bdgRef.subId !== undefined) {
        const sk = ck + ':' + r.bdgRef.subId;
        out[sk] = (out[sk] || 0) + r.amt;
      }
    });
    return out;
  }

      </div>`;
    });
    html += `<button class="tree-none-btn" onclick="selectBdgRef(null)">不關聯 / 移除關聯</button>`;
    document.getElementById('treeContent').innerHTML = html;
  }

  function treeToggleParent(k) {
    const ch = document.getElementById('tpc-' + k);
    const ar = document.getElementById('tpa-' + k);
    if (!ch) {
      // no children → directly select parent
      selectBdgRef(k, undefined);
      return;
    }
    const isOpen = ch.classList.contains('open');
    document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.tree-p-arrow').forEach(el => el.classList.remove('open'));
    if (!isOpen) { ch.classList.add('open'); if (ar) ar.classList.add('open'); }
    else selectBdgRef(k, undefined);
  }

  function selectBdgRef(catKey, subId) {
    if (_treeRecId === null) return;
    const rec = recs.find(r => r.id === _treeRecId);
    if (!rec) return;
    if (!catKey) {
      delete rec.bdgRef;
      toast('已移除關聯');
    } else {
      rec.bdgRef = subId !== undefined ? { catKey, subId } : { catKey };
      const c = CATS[catKey];
      const plan = bdgPlan[catKey];
      const sub  = subId !== undefined ? plan.subs.find(s => s.id === subId) : null;
      toast('已關聯：' + c.icon + ' ' + c.lbl + (sub ? ' › ' + sub.name : ''));
    }
    save();
    render();
    closeTreePicker();
  }

  /* ── 切換總額顯示模式 ── */
  const saveMode = () => {
    const v = showBudgetTotal ? '1' : '0';
    idbSet(SK_MODE, v);
    try { localStorage.setItem(SK_MODE, v); } catch(e) {}
  };
  let totalModeTipTimer = null;
  function toggleTotalMode() {
    showBudgetTotal = !showBudgetTotal;
    saveMode();
    render();
    // 浮動提示
    const tip = document.getElementById('totalModeTip');
    if (!tip.querySelector('span')) tip.innerHTML = '<span></span>';
    const s = tip.querySelector('span');
    s.textContent = showBudgetTotal ? '顯示：預算內' : '顯示：全部';
    s.classList.add('show');
    clearTimeout(totalModeTipTimer);
    totalModeTipTimer = setTimeout(() => s.classList.remove('show'), 1000);
  }

  /* ── 花費上限 Modal ── */
  function openBudget() {
    const el = document.getElementById('budgetInput');
    el.value = budget > 0 ? budget : '';
    document.getElementById('budgetOverlay').classList.add('open');
    setTimeout(() => { el.focus(); el.select(); }, 120);
  }

  function closeBudget() {
    document.getElementById('budgetOverlay').classList.remove('open');
    document.getElementById('budgetInput').blur();
  }

  function confirmBudget() {
    const v = parseInt(document.getElementById('budgetInput').value, 10);
    budget = (isNaN(v) || v <= 0) ? 0 : Math.min(v, 999999);
    saveBdg();
    closeBudget();
    render();
    toast(budget > 0 ? '上限設為 NT$' + budget.toLocaleString() : '已取消上限');
  }

  /* ── 更新日期標籤顯示 ── */
  function updateDateLbl() {
    const v = document.getElementById('dateInp').value;
    const lbl = document.getElementById('dateLbl');
    if (!v) { lbl.textContent = '選擇日期'; return; }
    const d = new Date(v + 'T00:00:00');
    lbl.textContent = d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric', weekday: 'short' });
  }

  /* ── 初始化 ── */
  async function init() {
    await loadAll();
    rebuildCats();
    initBdgPlan(); // 確保每個 catKey 都有預算結構
    // 從現有資料的最大 id 繼續，避免重複
    if (recs.length > 0) _nextId = Math.max(...recs.map(r => r.id)) + 1;

    // 資料重置偵測：若上次有記帳但這次 recs 是空的，警告可能被系統清除
    const SK_LAST = 'kakeibo_last_open';
    const lastHadData = localStorage.getItem(SK_LAST) === '1';
    if (lastHadData && recs.length === 0) {
      setTimeout(() => toast('⚠️ 偵測到資料可能被清除，請確認或匯入備份'), 500);
    }
    try { localStorage.setItem(SK_LAST, recs.length > 0 ? '1' : '0'); } catch(e) {}

    // 請求持久化儲存 + 空間偵測
    if (navigator.storage) {
      if (navigator.storage.persist) {
        navigator.storage.persist().catch(() => {});
      }
      if (navigator.storage.estimate) {
        navigator.storage.estimate().then(est => {
          const remainingMB = (est.quota - est.usage) / 1024 / 1024;
          if (remainingMB < 100) {
            toast('⚠️ 裝置空間不足，記帳資料可能有遺失風險');
          }
        }).catch(() => {});
      }
    }

    const now = new Date();
    vy = now.getFullYear();
    vm = now.getMonth();
    document.getElementById('dateInp').value = fmtD(now);
    updateDateLbl();
    document.getElementById('dateInp').addEventListener('change', updateDateLbl);

    renderCatBtns();
    setupLongPress();
    setupListLongPress();
    setupEmojiPicker();

    // 月份按鈕
    document.getElementById('btnPrevM').addEventListener('touchstart', e => { e.preventDefault(); chM(-1); }, { passive: false });
    document.getElementById('btnNextM').addEventListener('touchstart', e => { e.preventDefault(); chM(1);  }, { passive: false });
    document.getElementById('btnPrevM').addEventListener('click', () => chM(-1));
    document.getElementById('btnNextM').addEventListener('click', () => chM(1));

    // Tab 按鈕
    document.getElementById('tabList').onclick = () => goTab('list');
    document.getElementById('tabAna').onclick  = () => goTab('ana');
    document.getElementById('tabBdgPlan').onclick = () => goTab('bdgplan');

    // tree overlay
    document.getElementById('treeCancelBtn').onclick = closeTreePicker;
    document.getElementById('treeOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('treeOverlay')) closeTreePicker();
    });

    // backup menu overlay
    const bmo = document.getElementById('backupMenuOverlay');
    bmo.style.display = 'flex';
    bmo.style.display = 'none';
    bmo.addEventListener('click', e => { if (e.target === bmo) closeBackupMenu(); });

    // month picker
    document.getElementById('mpYearPrev').onclick = () => { mpYear--; renderMpYear(); };
    document.getElementById('mpYearNext').onclick = () => { mpYear++; renderMpYear(); };
    document.getElementById('mpCancelBtn').onclick = closeMp;
    document.getElementById('monthPickerOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('monthPickerOverlay')) closeMp();
    });
    document.getElementById('mLabel').onclick = openMonthPicker;

    // 花費上限 — 右鍵或長按總金額區
    document.getElementById('totalAmt').addEventListener('contextmenu', e => { e.preventDefault(); openBudget(); });
    let budgetPressTimer = null;
    document.getElementById('totalAmt').addEventListener('touchstart', e => {
      budgetPressTimer = setTimeout(() => { e.stopPropagation(); openBudget(); }, 600);
    }, { passive: true });
    document.getElementById('totalAmt').addEventListener('touchend',  () => clearTimeout(budgetPressTimer), { passive: true });
    document.getElementById('totalAmt').addEventListener('touchmove', () => clearTimeout(budgetPressTimer), { passive: true });

    document.getElementById('budgetCancelBtn').onclick = closeBudget;
    document.getElementById('budgetOkBtn').onclick     = confirmBudget;
    document.getElementById('budgetInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmBudget();
      if (e.key === 'Escape') closeBudget();
    });
    document.getElementById('budgetOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('budgetOverlay')) closeBudget();
    });

    setupSwipe();
    setupMonthSwipe();

    // 數字鍵盤：touchstart event delegation
    const grid = document.getElementById('kbGrid');
    let delInterval = null;
    let delTimeout  = null;

    const startDel = () => {
      nd();
      delTimeout = setTimeout(() => {
        delInterval = setInterval(() => { nd(); }, 80);
      }, 400);
    };
    const stopDel = () => {
      clearTimeout(delTimeout);
      clearInterval(delInterval);
      delTimeout = delInterval = null;
    };

    grid.addEventListener('touchstart', e => {
      const btn = e.target.closest('[data-n],[data-del],[data-ok]');
      if (!btn) return;
      e.preventDefault();
      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 90);
      if (btn.dataset.n   !== undefined) ni(btn.dataset.n);
      else if (btn.dataset.del !== undefined) startDel();
      else if (btn.dataset.ok  !== undefined) addRec();
    }, { passive: false });

    grid.addEventListener('touchend',    e => { if (e.target.closest('[data-del]')) stopDel(); }, { passive: true });
    grid.addEventListener('touchcancel', e => { if (e.target.closest('[data-del]')) stopDel(); }, { passive: true });

    // 桌機 mousedown fallback（數字鍵）
    grid.addEventListener('mousedown', e => {
      const btn = e.target.closest('[data-n],[data-del],[data-ok]');
      if (!btn) return;
      if (btn.dataset.n   !== undefined) ni(btn.dataset.n);
      else if (btn.dataset.del !== undefined) startDel();
      else if (btn.dataset.ok  !== undefined) addRec();
    });
    grid.addEventListener('mouseup',    e => { if (e.target.closest('[data-del]')) stopDel(); });
    grid.addEventListener('mouseleave', e => { if (delInterval || delTimeout) stopDel(); });

    // Rename Modal 按鈕
    document.getElementById('renameCancelBtn').onclick = closeRename;
    document.getElementById('renameOkBtn').onclick     = confirmRename;
    document.getElementById('renameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmRename();
      if (e.key === 'Escape') closeRename();
    });
    // 點擊背景關閉
    document.getElementById('renameOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('renameOverlay')) closeRename();
    });

    render();
  }

  /* ── 數字輸入 ── */
  function ni(v) {
    if (inp.length >= 6) return;
    if (v === '0' && inp === '') return;
    inp += v;
    ud();
  }

  function nd() {
    inp = inp.slice(0, -1);
    ud();
  }

  function ud() {
    const a = document.getElementById('aN');
    const c = document.getElementById('kc');
    if (!inp) {
      a.textContent = '0';
      a.className   = 'ph';
      c.style.display = 'inline-block';
    } else {
      a.textContent = inp;
      a.className   = '';
      c.style.display = 'none';
    }
  }

  /* ── 選分類 ── */
  function sc(id) {
    cat = id;
    document.querySelectorAll('.cbt').forEach(b => b.classList.toggle('on', b.dataset.c === id));
  }

  /* ── 新增記帳 ── */
  function addRec() {
    const amt = parseInt(inp, 10);
    if (!amt || amt <= 0) { toast('請輸入金額'); return; }

    const dv = document.getElementById('dateInp').value;
    if (!dv) { toast('請選日期'); return; }

    const note = document.getElementById('noteInp').value.trim();
    recs.unshift({ id: _nextId++, date: dv, cat, amt, note });
    save();
    autoBackupIfNeeded();

    inp = '';
    ud();
    document.getElementById('noteInp').value = '';

    const d = new Date(dv + 'T00:00:00');
    vy = d.getFullYear();
    vm = d.getMonth();
    render();
    toast(CATS[cat].icon + ' NT$' + amt.toLocaleString());
  }

  /* ── 切換免計入預算 ── */
  function toggleExempt(id) {
    const r = recs.find(r => r.id === id);
    if (!r) return;
    r.exempt = !r.exempt;
    save();
    render();
    toast(r.exempt ? '已從預算中排除' : '已計入預算');
  }

  /* ── 刪除記帳 ── */
  function delRec(id) {
    recs = recs.filter(r => r.id !== id);
    save();
    render();
  }

  /* ── 切換月份 ── */
  function chM(d) {
    vm += d;
    if (vm > 11) { vm = 0; vy++; }
    if (vm < 0)  { vm = 11; vy--; }
    collapsed = {};
    const cls = d > 0 ? 'slide-in-right' : 'slide-in-left';
    const panel = ctab === 'list' ? document.getElementById('listPanel') : document.getElementById('anaPanel');
    render();
    panel.classList.remove('slide-in-left', 'slide-in-right');
    void panel.offsetWidth;
    panel.classList.add(cls);
    setTimeout(() => panel.classList.remove(cls), 300);
  }

  /* ── 切換 Tab ── */
  function goTab(t, dir) {
    if (ctab === t) return;
    ctab = t;
    document.getElementById('tabList').classList.toggle('on', t === 'list');
    document.getElementById('tabAna').classList.toggle('on', t === 'ana');
    document.getElementById('tabBdgPlan').classList.toggle('on', t === 'bdgplan');
    const wrap = document.getElementById('panelWrap');
    if (t === 'list')      wrap.style.transform = 'translateX(0)';
    else if (t === 'ana')  wrap.style.transform = 'translateX(-33.333%)';
    else                   wrap.style.transform = 'translateX(-66.666%)';
    render();
  }

  /* ── 折疊日期群組 ── */
  function toggleDate(date) {
    collapsed[date] = !collapsed[date];
    const items = document.getElementById('di-' + date);
    const arrow = document.getElementById('da-' + date);
    if (items) items.style.display = collapsed[date] ? 'none' : 'block';
    if (arrow) arrow.textContent   = collapsed[date] ? '▸' : '▾';
  }

  /* ── 取得當月記帳 ── */
  function getMrs() {
    const p = vy + '-' + String(vm + 1).padStart(2, '0');
    return recs.filter(r => r.date.startsWith(p));
  }

  /* ── 主渲染 ── */
  function render() {
    const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('mLabel').textContent = vy + '．' + mn[vm];
    const mrs   = getMrs();
    const total = mrs.reduce((s, r) => s + r.amt, 0);
    const budgetTotal = mrs.reduce((s, r) => s + (r.exempt ? 0 : r.amt), 0);

    const tEl   = document.getElementById('totalAmt');
    const tNum  = document.getElementById('tNum');
    const hint  = document.getElementById('budgetHint');

    const displayTotal = showBudgetTotal ? budgetTotal : total;

    // 預算超出判斷（永遠以 budgetTotal 為準）
    if (budget > 0 && budgetTotal > budget) {
      const diff = budgetTotal - budget;
      tNum.textContent = showBudgetTotal ? ('-' + diff.toLocaleString()) : total.toLocaleString();
      tEl.classList.toggle('over', showBudgetTotal);
      hint.textContent = showBudgetTotal ? '超出上限 NT$' + budget.toLocaleString() : '⚠ 預算內已超出';
      hint.className = 'over';
    } else {
      tNum.textContent = displayTotal.toLocaleString();
      tEl.classList.remove('over');
      if (budget > 0) {
        const rem = budget - budgetTotal;
        hint.textContent = '上限 NT$' + budget.toLocaleString() + '　剩 ' + rem.toLocaleString();
        hint.className = '';
      } else {
        hint.textContent = '';
        hint.className = '';
      }
    }

    // ensure correct panel visible
    const wrap = document.getElementById('panelWrap');
    if (wrap) {
      if (ctab === 'list')     wrap.style.transform = 'translateX(0)';
      else if (ctab === 'ana') wrap.style.transform = 'translateX(-33.333%)';
      else                     wrap.style.transform = 'translateX(-66.666%)';
    }
    const displayMrs = showBudgetTotal ? mrs.filter(r => !r.exempt) : mrs;
    renderList(displayMrs, mrs);
    renderAna(displayMrs, displayTotal);
    renderBdgPlan();
  }

  /* ── 列表渲染 ── */
  function renderList(mrs, allMrs) {
    const lp = document.getElementById('listPanel');

    // 過濾模式：只看未關聯預算的項目
    let displayList = mrs;
    if (listFilterUnlinked) {
      displayList = mrs.filter(r => !r.bdgRef || !r.bdgRef.catKey);
    }

    const filterBanner = listFilterUnlinked
      ? `<div class="list-filter-banner" onclick="listFilterUnlinked=false;render()">
          <span>🔍 只顯示未關聯預算的項目 · 共 ${displayList.length} 筆</span>
          <span class="list-filter-close">✕ 取消</span>
        </div>`
      : '';

    if (displayList.length === 0) {
      lp.innerHTML = filterBanner + (listFilterUnlinked
        ? '<div class="empty"><div class="empty-ico">✅</div>全部項目都已關聯預算了！</div>'
        : '<div class="empty"><div class="empty-ico">🌸</div>這個月還沒有記帳</div>');
      return;
    }

    const g = {};
    displayList.forEach(r => { (g[r.date] = g[r.date] || []).push(r); });
    const dates = Object.keys(g).sort((a, b) => b.localeCompare(a));

    lp.innerHTML = filterBanner + dates.map(date => {
      const d  = new Date(date + 'T00:00:00');
      const dl = d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric', weekday: 'short' });
      const dt = g[date].reduce((s, r) => s + r.amt, 0);
      const isCollapsed = !!collapsed[date];

      const items = g[date].map(r => {
        const c = CATS[r.cat] || CATS.daily;
        let bdgTag = '';
        if (r.bdgRef && r.bdgRef.catKey) {
          const rc = CATS[r.bdgRef.catKey];
          const plan = bdgPlan[r.bdgRef.catKey];
          if (rc && plan) {
            const sub = r.bdgRef.subId !== undefined ? plan.subs.find(s => s.id === r.bdgRef.subId) : null;
            bdgTag = `<span class="ri-bdg-tag">${rc.icon} ${rc.lbl}${sub ? ' › '+sub.name : ''}</span>`;
          }
        }
        return `<div class="ri${r.exempt ? ' exempt-row' : ''}">
          <div class="ri-ico" style="cursor:pointer" onclick="openTreePicker(${r.id})" title="點擊關聯預算">${c.icon}</div>
          <div class="ri-info"
            oncontextmenu="return false"
            style="-webkit-user-select:none;user-select:none;touch-action:manipulation"
          >
            <div class="ri-note">${r.note ? esc(r.note) : c.lbl}</div>
            <div class="ri-cat">${c.lbl}${bdgTag}</div>
          </div>
          <div class="ri-amt${r.exempt ? ' exempt' : ''}" onclick="toggleExempt(${r.id})" title="點擊切換是否計入預算"><small>$</small>${r.amt.toLocaleString()}</div>
          <button class="ri-del" onclick="delRec(${r.id})">✕</button>
        </div>`;
      }).join('');

      return `
        <div class="dg-head" onclick="toggleDate('${date}')">
          <span><span id="da-${date}" class="dg-arrow">${isCollapsed ? '▸' : '▾'}</span> ${dl}</span>
          <span style="color:var(--roseDk);font-family:Montserrat,sans-serif;font-weight:700">$${dt.toLocaleString()}</span>
        </div>
        <div id="di-${date}" style="display:${isCollapsed ? 'none' : 'block'}">${items}</div>`;
    }).join('');
  }

  /* ── 分析展開狀態 ── */
  const anaOpen = {};

  /* ── 分析渲染 ── */
  function renderAna(mrs, total) {
    const ap = document.getElementById('anaPanel');
    if (mrs.length === 0) {
      ap.innerHTML = '<div class="ana-empty">這個月還沒有記帳 🌸</div>';
      return;
    }

    const tv = {};
    CKEYS.forEach(k => { tv[k] = 0; });
    mrs.forEach(r => {
      const key = CKEYS.includes(r.cat) ? r.cat : 'daily';
      tv[key] += r.amt;
    });

    // 本月各細分類實際花費（透過 bdgRef）— 在展開時按需計算
    const segs = CKEYS.map((k, i) => {
      const pct = total > 0 ? (tv[k] / total * 100) : 0;
      return pct > 0
        ? `<div class="stack-seg" style="width:${pct.toFixed(1)}%;background:${CAT_C[i]}"></div>`
        : '';
    }).join('');

    const sorted = [...CKEYS].sort((a, b) => tv[b] - tv[a]);

    const cards = sorted.map(k => {
      const i    = CKEYS.indexOf(k);
      const c    = CATS[k];
      const v    = tv[k];
      const pct  = total > 0 ? Math.round(v / total * 100) : 0;
      const plan = bdgPlan[k] || { budget: 0, subs: [] };
      const isOpen = !!anaOpen[k];

      // 細分類列表（只顯示有資料的，加上預算對比）
      let subsHtml = '';
      if (isOpen) {
        const bdgSp = getBdgSpending();
        if (plan.subs.length > 0) {
          plan.subs.forEach(s => {
            const ss    = bdgSp[k + ':' + s.id] || 0;
            const sOver = s.budget > 0 && ss > s.budget;
            const sRem  = s.budget > 0 ? s.budget - ss : null;
            subsHtml += `<div class="ana-sub-row">
              <span class="ana-sub-dot"></span>
              <span class="ana-sub-name">${esc(s.name)}</span>
              ${s.budget > 0 ? `<span class="ana-sub-budget">$${s.budget.toLocaleString()}</span>` : ''}
              <span class="ana-sub-spent${sOver?' over':''}">$${ss.toLocaleString()}</span>
              ${sRem !== null ? `<span class="ana-sub-rem${sOver?' over':''}">剩$${Math.max(0,sRem).toLocaleString()}</span>` : ''}
            </div>`;
          });
        } else {
          subsHtml = `<div class="ana-no-sub">尚未設定細分類 → 前往「預算」頁新增</div>`;
        }
      }

      return `<div class="cat-card" onclick="toggleAnaCard('${k}')" style="cursor:pointer">
        <div class="cat-card-top">
          <div class="cat-dot" style="background:${CAT_C[i]}"></div>
          <div class="cat-name">${c.icon} ${c.lbl}</div>
          <div class="cat-pct">${pct}%</div>
          <div class="cat-amt"><small>$</small>${v.toLocaleString()}</div>
          <span style="font-size:9px;color:var(--rose);margin-left:4px">${isOpen ? '▴' : '▾'}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${CAT_C[i]}"></div></div>
        ${isOpen ? `<div class="ana-subs-wrap">${subsHtml}</div>` : ''}
      </div>`;
    }).join('');

    const legend = CKEYS
      .filter(k => tv[k] > 0)
      .map(k => {
        const i = CKEYS.indexOf(k);
        return `<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${CAT_C[i]}"></span>
          ${CATS[k].lbl}
        </span>`;
      }).join('');

    ap.innerHTML = `
      <div class="ana-total">
        <div class="ana-total-label">本月支出</div>
        <div class="ana-total-num"><small>NT$</small>${total.toLocaleString()}</div>
      </div>
      <div class="ana-stack-wrap">
        <div class="stack-bar">${segs}</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:2px">${legend}</div>
      </div>
      ${cards}`;
  }

  function toggleAnaCard(k) {
    anaOpen[k] = !anaOpen[k];
    const mrs = getMrs();
    const displayMrs = showBudgetTotal ? mrs.filter(r => !r.exempt) : mrs;
    const displayTotal = displayMrs.reduce((s, r) => s + r.amt, 0);
    renderAna(displayMrs, displayTotal);
  }

  /* ── Toast ── */
  let _toastTimer = null;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  /* ── 匯出 CSV ── */
  function exportCSV() {
    if (recs.length === 0) { toast('沒有資料可以匯出'); return; }
    const header = '日期,分類,金額,備註,不計入預算';
    const rows = recs.map(r => {
      const c    = CATS[r.cat] || CATS.daily;
      const note = (r.note || '').replace(/,/g, '，').replace(/\n/g, ' ');
      return `${r.date},${c.lbl},${r.amt},${note},${r.exempt ? '是' : ''}`;
    });
    const csv  = '\uFEFF' + header + '\n' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const now  = new Date();
    a.href     = url;
    a.download = `記帳_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('已匯出 CSV ↓');
  }

  /* ── 備份 JSON（完整資料） ── */
  function backupJSON() {
    const payload = {
      v: 2,
      ts: Date.now(),
      recs,
      bdgPlan,
      labels: (() => { try { return JSON.parse(localStorage.getItem(SK_LBL) || '{}'); } catch(e) { return {}; } })(),
      budget: (() => { try { return JSON.parse(localStorage.getItem(SK_BDG) || 'null'); } catch(e) { return null; } })(),
    };
    const json = JSON.stringify(payload);
    const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const now  = new Date();
    a.href     = url;
    a.download = `記帳備份_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('已備份 JSON ↓');
    closeBackupMenu();
  }

  /* ── 自動靜默備份（每次新增記帳後，累積 N 筆才下載） ── */
  const AUTO_BACKUP_EVERY = 5; // 每5筆自動備份一次
  function autoBackupIfNeeded() {
    // 用 localStorage 記錄上次備份時的筆數
    const lastCount = parseInt(localStorage.getItem('kakeibo_last_backup_count') || '0', 10);
    if (recs.length - lastCount >= AUTO_BACKUP_EVERY) {
      localStorage.setItem('kakeibo_last_backup_count', String(recs.length));
      // 靜默下載
      const payload = { v: 2, ts: Date.now(), recs, bdgPlan };
      const json = JSON.stringify(payload);
      const blob = new Blob([json], { type: 'application/json' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      const now  = new Date();
      a.href     = url;
      a.download = `記帳備份_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      toast('💾 已自動備份（每 ' + AUTO_BACKUP_EVERY + ' 筆一次）');
    }
  }

  /* ── 還原 JSON ── */
  function restoreJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data.recs || !Array.isArray(data.recs)) throw new Error('格式錯誤');
        // 確認
        const ok = confirm(`還原備份？\n共 ${data.recs.length} 筆記錄\n備份時間：${data.ts ? new Date(data.ts).toLocaleString() : '未知'}\n\n⚠️ 這會覆蓋目前所有資料！`);
        if (!ok) return;
        recs = data.recs;
        if (data.bdgPlan && typeof data.bdgPlan === 'object') bdgPlan = data.bdgPlan;
        initBdgPlan();
        if (recs.length > 0) _nextId = Math.max(...recs.map(r => r.id)) + 1;
        save();
        saveBdgPlan();
        render();
        toast('✅ 已還原 ' + recs.length + ' 筆資料');
        closeBackupMenu();
      } catch(err) {
        toast('❌ 還原失敗：' + err.message);
      }
    };
    input.click();
  }

  /* ── 備份選單 ── */
  function openBackupMenu() {
    const el = document.getElementById('backupMenuOverlay');
    el.style.display = 'flex';
  }
  function closeBackupMenu() {
    document.getElementById('backupMenuOverlay').style.display = 'none';
  }

  /* ── Month Picker ── */
  let mpYear = 0;

  function openMonthPicker() {
    mpYear = vy;
    renderMpYear();
    document.getElementById('monthPickerOverlay').classList.add('open');
  }

  function closeMp() {
    document.getElementById('monthPickerOverlay').classList.remove('open');
  }

  function renderMpYear() {
    document.getElementById('mpYearLabel').textContent = mpYear;
    const grid = document.getElementById('mpMonthGrid');
    const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    grid.innerHTML = mn.map((n, i) => {
      const on = (mpYear === vy && i === vm) ? ' on' : '';
      return `<button class="mp-m${on}" onclick="selectYM(${i})">${n}</button>`;
    }).join('');
  }

  function selectYM(m) {
    const prevVm = vm, prevVy = vy;
    vy = mpYear; vm = m;
    collapsed = {};
    closeMp();
    const direction = (vy > prevVy || (vy === prevVy && vm > prevVm)) ? 1 : -1;
    const cls = direction > 0 ? 'slide-in-right' : 'slide-in-left';
    render();
    const panel = ctab === 'list' ? document.getElementById('listPanel') : document.getElementById('anaPanel');
    panel.classList.remove('slide-in-left', 'slide-in-right');
    void panel.offsetWidth;
    panel.classList.add(cls);
    setTimeout(() => panel.classList.remove(cls), 300);
  }

  /* ── Swipe on scroll area ── */
  function setupSwipe() {
    const area = document.getElementById('scrollArea');
    const tabOrder = ['list', 'ana', 'bdgplan'];
    let sx = 0, sy = 0, tracking = false;

    area.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
      tracking = true;
    }, { passive: true });

    area.addEventListener('touchend', e => {
      if (!tracking) return;
      tracking = false;
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) < 30 || Math.abs(dy) > Math.abs(dx)) return;
      const idx = tabOrder.indexOf(ctab);
      if (dx < 0 && idx < tabOrder.length - 1) goTab(tabOrder[idx + 1]);
      else if (dx > 0 && idx > 0) goTab(tabOrder[idx - 1]);
    }, { passive: true });

    area.addEventListener('touchcancel', () => { tracking = false; }, { passive: true });
  }

  /* ── Swipe on top bar for month ── */
  function setupMonthSwipe() {
    const top = document.getElementById('top');
    let sx = 0, moved = false, blocked = false;

    top.addEventListener('touchstart', e => {
      // 不在 totalAmt 區塊才允許月份滑動
      blocked = !!e.target.closest('#totalAmt, [onclick="toggleTotalMode()"]');
      sx = e.touches[0].clientX;
      moved = false;
    }, { passive: true });

    top.addEventListener('touchmove', e => { moved = true; }, { passive: true });

    top.addEventListener('touchend', e => {
      if (!moved || blocked) { blocked = false; return; }
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) < 40) return;
      chM(dx < 0 ? 1 : -1);
    }, { passive: true });

    top.addEventListener('touchcancel', () => { blocked = false; moved = false; }, { passive: true });
  }

  // PWA 生命週期：切換 App 或回桌面時強制寫入，防止 iOS 背景砍掉導致資料遺失
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      save(); saveLbl(); saveBdg(); saveMode(); saveBdgPlan();
    }
  });

  // 關閉分頁前最後寫入（補強 visibilitychange）
  window.addEventListener('beforeunload', () => {
    save(); saveLbl(); saveBdg(); saveMode(); saveBdgPlan();
  });

  init();
</script>
</body>
</html>
