<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#f0d8d8">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="./manifest.json">
  <title>記帳</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc, deleteDoc, getDoc, collection, getDocs, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAKpdKG7Z9VftOewWAF8icxJDlyt-za8R4",
      authDomain: "counter-e1ce2.firebaseapp.com",
      projectId: "counter-e1ce2",
      storageBucket: "counter-e1ce2.firebasestorage.app",
      messagingSenderId: "1079520607651",
      appId: "1:1079520607651:web:d75a7447f1c6de3e5e2e16"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // 掛到 window，讓非 module 的 script 可以存取
    window._fb = { auth, db, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut, doc, setDoc, deleteDoc, getDoc, collection, getDocs, onSnapshot };

    // 監聽登入狀態：登入後嘗試寫一筆 _ping，靠 Firestore Rules 判斷是否有權限
    onAuthStateChanged(auth, async user => {
      if (user) {
        try {
          // 用 Firestore Rules 當守門員，不在前端放任何白名單
          await setDoc(doc(db, 'users', user.uid, 'meta', '_ping'), { ts: Date.now() });
          // 通過 → 進入 App
          document.getElementById('loginDenied').style.display = 'none';
          window._fbUser = user;
          document.getElementById('loginOverlay').style.display = 'none';
          if (!window._appInited) {
            window._appInited = true;
            window._fbLoadAndInit();
          }
        } catch(e) {
          // Firestore Rules 拒絕 → 強制登出
          await signOut(auth);
          window._fbUser = null;
          document.getElementById('loginOverlay').style.display = 'flex';
          document.getElementById('loginDenied').style.display = 'block';
          document.getElementById('loginUidHint').style.display = 'none';
          document.getElementById('googleSignInBtn').style.display = 'flex';
          document.getElementById('loginSyncBadge').textContent = 'GOOGLE 登入';
        }
      } else {
        window._fbUser = null;
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('loginSyncBadge').textContent = 'GOOGLE 登入';
        document.getElementById('loginSyncBadge').style.userSelect = '';
        document.getElementById('googleSignInBtn').style.display = 'flex';
        document.getElementById('loginUidHint').style.display = 'none';
        document.getElementById('loginDenied').style.display = 'none';
      }
    });

    window._googleSignIn = async () => {
      try {
        document.getElementById('loginDenied').style.display = 'none';
        const provider = new GoogleAuthProvider();
        await signInWithPopup(auth, provider);
      } catch(e) {
        console.error('登入失敗', e);
        alert('登入失敗：' + e.message);
      }
    };
  </script>
  <style>
    :root {
      --rose:   #e8b8b8;
      --roseDk: #c99090;
      --accent: #8c6f6f;
      --text:   #4a3a3a;
      --muted:  #a88888;
      --card:   #fff;
      --bg1:    #fdf6f6;
      --bg2:    #f7e8e8;
      --bdr:    rgba(220,170,170,0.25);
      --shd:    rgba(220,170,170,0.18);
      --danger: #e07070;
      --kb-h:   256px;
    }

    *, *::before, *::after {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      margin: 0;
      padding: 0;
    }

    html { background: var(--bg1); }

    body {
      font-family: "Noto Sans TC", sans-serif;
      background: linear-gradient(170deg, var(--bg1) 0%, var(--bg2) 100%);
      background-attachment: fixed;
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-user-select: none;
      user-select: none;
      padding-bottom: calc(var(--kb-h) + 8px);
    }

    /* ── TOP ── */
    #top {
      padding: max(env(safe-area-inset-top, 20px), 20px) 18px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mnav { display: flex; align-items: center; gap: 4px; }

    .mb {
      background: none;
      border: none;
      color: var(--rose);
      font-size: 24px;
      cursor: pointer;
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .mb:active { background: rgba(220,170,170,0.18); }

    #mLabel {
      font-family: "Montserrat", sans-serif;
      font-size: 14px;
      font-weight: 700;
      letter-spacing: .4px;
      color: var(--text);
      min-width: 90px;
      text-align: center;
    }

    #totalAmt {
      font-family: "Montserrat", sans-serif;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      color: var(--text);
      text-align: right;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      transition: color .2s;
    }
    #totalAmt .cur {
      font-size: 12px;
      color: var(--muted);
      font-weight: 600;
      letter-spacing: 0;
      vertical-align: 2px;
      margin-right: 1px;
    }
    #totalAmt.over {
      color: var(--danger);
      animation: overPulse .4s ease;
    }
    #totalAmt.over .cur { color: var(--danger); opacity: .7; }
    @keyframes overPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
    #budgetHint {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: .5px;
      color: var(--muted);
      text-align: right;
      margin-top: 1px;
      opacity: .6;
      line-height: 1;
      min-height: 12px;
    }
    #totalModeTip {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: center;
      pointer-events: none;
      z-index: 150;
    }
    #totalModeTip span {
      background: rgba(140,111,111,0.82);
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .8px;
      padding: 5px 14px;
      border-radius: 0 0 12px 12px;
      opacity: 0;
      transform: translateY(-100%);
      transition: opacity .2s, transform .2s;
      white-space: nowrap;
    }
    #totalModeTip span.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── TABS ── */
    #tabs {
      display: flex;
      margin: 0 14px 10px;
      background: rgba(255,255,255,0.55);
      border-radius: 13px;
      border: 1px solid var(--bdr);
      overflow: hidden;
      padding: 3px;
      gap: 3px;
    }

    .tb {
      flex: 1;
      padding: 7px 0;
      font-size: 11px;
      font-weight: 700;
      text-align: center;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      border-radius: 10px;
      letter-spacing: .8px;
    }
    .tb.on { background: var(--rose); color: #fff; box-shadow: 0 2px 8px var(--shd); }

    /* ── SCROLL ── */
    #scrollArea { padding: 0; }

    /* ── LIST ── */
    .dg-head {
      font-size: 10px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1.2px;
      padding: 10px 4px 5px;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
    }
    .dg-head:active { opacity: .65; }
    .dg-arrow { margin-right: 4px; font-size: 9px; color: var(--rose); }

    .ri {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 13px;
      background: var(--card);
      border-radius: 14px;
      margin-bottom: 6px;
      border: 1px solid var(--bdr);
      box-shadow: 0 2px 10px var(--shd);
      animation: fi .2s ease;
    }
    @keyframes fi {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: none; }
    }

    .ri-ico {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: linear-gradient(135deg, #fdf0f0, #f5dede);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      flex-shrink: 0;
    }
    .ri-info  { flex: 1; min-width: 0; -webkit-user-select: none; user-select: none; cursor: pointer; }
    .ri-note  { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .ri-cat   { font-size: 10px; color: var(--muted); margin-top: 1px; }
    .ri-amt   { font-family: "Montserrat", sans-serif; font-size: 15px; font-weight: 800; white-space: nowrap; cursor: pointer; }
    .ri-amt small { font-size: 10px; color: var(--muted); font-weight: 500; margin-right: 1px; }
    .ri-amt.exempt { color: var(--muted); }
    .ri.exempt-row {
      background: repeating-linear-gradient(
        135deg,
        rgba(220,170,170,0.07) 0px,
        rgba(220,170,170,0.07) 8px,
        transparent 8px,
        transparent 16px
      );
      border-color: rgba(220,170,170,0.15);
      opacity: .72;
    }

    .ri-del {
      background: none;
      border: none;
      color: rgba(200,150,150,0.35);
      font-size: 13px;
      cursor: pointer;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .ri-del:active { color: var(--danger); background: rgba(224,112,112,0.1); }

    .empty     { text-align: center; padding: 36px 20px; color: var(--muted); font-size: 13px; opacity: .65; }
    .empty-ico { font-size: 30px; margin-bottom: 8px; opacity: .4; }

    /* ── 分析 ── */
    #anaPanel { }

    .ana-total {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--bdr);
      box-shadow: 0 2px 10px var(--shd);
      padding: 16px;
      margin-bottom: 10px;
      text-align: center;
    }
    .ana-total-label { font-size: 10px; color: var(--muted); letter-spacing: 1.5px; margin-bottom: 4px; }
    .ana-total-num {
      font-family: "Montserrat", sans-serif;
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -1px;
      color: var(--text);
    }
    .ana-total-num small { font-size: 14px; color: var(--muted); font-weight: 600; margin-right: 2px; }

    .ana-stack-wrap {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--bdr);
      box-shadow: 0 2px 10px var(--shd);
      padding: 14px 16px;
      margin-bottom: 10px;
    }

    .stack-bar {
      height: 20px;
      border-radius: 10px;
      overflow: hidden;
      display: flex;
      margin-bottom: 10px;
      background: rgba(220,170,170,0.1);
    }
    .stack-seg { height: 100%; }

    .cat-card {
      background: var(--card);
      border-radius: 14px;
      border: 1px solid var(--bdr);
      box-shadow: 0 2px 10px var(--shd);
      padding: 12px 14px;
      margin-bottom: 7px;
    }
    .cat-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
    .cat-dot  { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
    .cat-name { flex: 1; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
    .cat-pct  { font-family: "Montserrat", sans-serif; font-size: 11px; color: var(--muted); font-weight: 700; }
    .cat-amt  { font-family: "Montserrat", sans-serif; font-size: 15px; font-weight: 800; color: var(--text); margin-left: 8px; }
    .cat-amt small { font-size: 10px; color: var(--muted); font-weight: 500; margin-right: 1px; }

    .bar-bg   { height: 6px; border-radius: 3px; background: rgba(220,170,170,0.12); }
    .bar-fill { height: 100%; border-radius: 3px; }
    .ana-empty { text-align: center; padding: 30px; color: var(--muted); font-size: 13px; opacity: .6; }

    /* ── 浮動鍵盤 ── */
    #kb {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--kb-h);
      background: rgba(254,250,250,0.98);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top: 1px solid var(--bdr);
      border-radius: 22px 22px 0 0;
      box-shadow: 0 -4px 28px rgba(200,150,150,0.14);
      padding: 9px 12px max(env(safe-area-inset-bottom, 0px), 4px);
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 6px;
      z-index: 100;
    }

    .kb-r1 {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      padding: 0 2px;
    }

    #amtDisp {
      font-family: "Montserrat", sans-serif;
      font-size: 30px;
      font-weight: 800;
      letter-spacing: -1.5px;
      line-height: 1;
      grid-column: 1;
    }
    #amtDisp .cur { font-size: 12px; color: var(--muted); font-weight: 600; margin-right: 2px; vertical-align: 2px; }

    .ph { color: var(--rose) !important; opacity: .45; }
    .kb-cur {
      display: inline-block;
      width: 2px;
      height: 26px;
      background: var(--rose);
      vertical-align: middle;
      margin-left: 2px;
      animation: blink .9s infinite;
    }
    @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }

    #saveBtn {
      background: none;
      border: none;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      opacity: .55;
      transition: opacity .15s;
      grid-column: 2;
      justify-self: center;
    }
    #saveBtn:active { opacity: 1; }

    #dateLbl {
      font-family: "Noto Sans TC", sans-serif;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      text-align: right;
      white-space: nowrap;
      padding: 2px 0;
      border-bottom: 1px dashed rgba(168,136,136,0.4);
      grid-column: 3;
      justify-self: end;
    }
    #dateLbl:active { opacity: .6; }

    /* ── Panel wrap for swipe ── */
    #scrollArea {
      overflow: visible;
    }
    #panelClip {
      overflow: hidden;
      width: 100%;
    }
    #panelWrap {
      display: flex;
      width: 300%;
      transition: transform .32s cubic-bezier(.4,0,.2,1);
      will-change: transform;
    }
    #panelWrap.notransition { transition: none; }
    .swipe-panel {
      width: 33.333%;
      flex-shrink: 0;
      min-width: 0;
      padding: 0 14px;
      box-sizing: border-box;
    }

    .kb-r2 { display: flex; }

    .note-inp {
      flex: 1;
      border: 1.5px solid var(--bdr);
      border-radius: 50px;
      padding: 6px 13px;
      background: transparent;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 12px;
      color: var(--text);
      outline: none;
      -webkit-user-select: auto;
      user-select: auto;
    }
    .note-inp::placeholder { color: var(--muted); opacity: .7; }
    .note-inp:focus { border-color: var(--rose); }

    .kb-r3 { display: flex; gap: 4px; min-height: 0; }
    .kb-numgrid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 4px;
      min-width: 0;
    }
    .kb-catcol {
      width: 46px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      /* 讓捲動區域有把手感但不影響左側 */
      touch-action: pan-y;
      border-radius: 11px;
    }
    .kb-catcol::-webkit-scrollbar { width: 0; height: 0; }
    .kb-catcol .cbt { flex-shrink: 0; min-height: 40px; }
    .kb-catcol-addbtn {
      flex-shrink: 0;
      min-height: 30px;
      border-radius: 11px;
      border: 1.5px dashed var(--bdr);
      background: rgba(235,185,185,0.05);
      color: var(--rose);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .kb-catcol-addbtn:active { background: rgba(220,170,170,0.15); }

    .nb {
      border-radius: 11px;
      border: 1.5px solid var(--bdr);
      background: rgba(230,180,180,0.07);
      font-family: "Montserrat", sans-serif;
      font-size: 19px;
      font-weight: 700;
      color: var(--text);
      cursor: pointer;
      min-height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .nb.pressed { background: var(--rose); color: #fff; border-color: var(--rose); }
    .nb.del { font-size: 15px; color: var(--muted); }
    .nb.del.pressed { background: rgba(200,150,150,0.15); color: var(--accent); border-color: transparent; }
    .nb.ok {
      background: linear-gradient(135deg, #ebb8b8, #d49898);
      color: #fff;
      border-color: transparent;
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .4px;
      box-shadow: 0 3px 12px rgba(220,160,160,0.35);
    }
    .nb.ok.pressed { background: var(--accent); }

    .cbt {
      border-radius: 11px;
      border: 1.5px solid var(--bdr);
      background: rgba(235,185,185,0.08);
      font-size: 19px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      /* 讓長按不觸發系統選單，但仍允許在捲動清單中垂直滑動 */
      -webkit-touch-callout: none;
      touch-action: pan-y;
      position: relative;
    }
    .cbt.on      { background: var(--rose); border-color: var(--rose); box-shadow: 0 2px 8px rgba(220,160,160,0.4); }
    .cbt.pressed { opacity: .65; }
    .cbt.cbt-unsplit { border-style: dashed; background: rgba(168,136,136,0.08); }
    .cbt.cbt-unsplit.on { border-style: solid; background: var(--accent); border-color: var(--accent); }



    /* ── 重新命名 Modal ── */
    #renameOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(74,58,58,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;
      justify-content: center;
    }
    #renameOverlay.open { display: flex; }

    #renameBox {
      background: var(--card);
      border-radius: 20px;
      padding: 24px 22px 18px;
      width: min(320px, calc(100vw - 40px));
      box-shadow: 0 8px 40px rgba(200,140,140,0.28);
      animation: popIn .18s ease;
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(.9); }
      to   { opacity: 1; transform: scale(1); }
    }

    #renameTitle {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 1px;
      margin-bottom: 14px;
      text-align: center;
    }

    #renameInput {
      width: 100%;
      border: 1.5px solid var(--bdr);
      border-radius: 50px;
      padding: 9px 16px;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      outline: none;
      text-align: center;
      background: var(--bg1);
      -webkit-user-select: auto;
      user-select: auto;
    }
    #renameInput:focus { border-color: var(--rose); }

    .rename-btns {
      display: flex;
      gap: 8px;
      margin-top: 14px;
    }
    .rename-btns button {
      flex: 1;
      padding: 10px 0;
      border-radius: 50px;
      border: none;
      font-family: "Noto Sans TC", sans-serif;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }
    #renameCancelBtn { background: rgba(220,170,170,0.15); color: var(--muted); }
    #renameOkBtn     { background: linear-gradient(135deg, #ebb8b8, #d49898); color: #fff; }
    #renameCancelBtn:active { background: rgba(220,170,170,0.28); }
    #renameOkBtn:active     { background: var(--accent); }


    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: calc(var(--kb-h) + 12px);
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: var(--accent);
      color: #fff;
      padding: 8px 20px;
      border-radius: 50px;
      font-size: 12px;
      font-weight: 700;
      opacity: 0;
      transition: opacity .2s, transform .2s;
      pointer-events: none;
      white-space: nowrap;
      z-index: 200;
    }
    /* ── Budget Modal ── */

    /* ── Budget Modal ── */
    #budgetOverlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(74,58,58,0.45);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      z-index: 300;
      align-items: center;

<script>
  /* ── 分類（可自由新增/刪除/排序） ── */
  // CATS_LIST 為唯一真實來源（順序 = 顯示順序），CATS / CKEYS 由它派生
  let CATS_LIST = [
    { key: 'food',  icon: '🍴', lbl: '食物'  },
    { key: 'snack', icon: '🍫', lbl: '零食'  },
    { key: 'fun',   icon: '✨', lbl: '娛樂'  },
    { key: 'daily', icon: '🧻', lbl: '日用品' },
  ];
  // 特殊分類：待拆帳。永遠存在、不可刪除、不計入預算規劃/分析統計。
  const UNSPLIT_KEY = 'unsplit';
  const UNSPLIT_CAT = { key: UNSPLIT_KEY, icon: '✂️', lbl: '待拆帳' };
  // 分類被刪除後，舊紀錄的分類顯示用回退物件
  const UNCATEGORIZED = { icon: '🏷️', lbl: '未分類' };

  const CAT_C_POOL = ['#e8b8b8','#b8d4e8','#b8e8cc','#e8ddb8','#d8c4e8','#e8c4a8','#a8d8d0','#e8a8c0','#c8d8a0','#a8c0e8'];
  const catColor = (i) => CAT_C_POOL[i % CAT_C_POOL.length];

  let _catSeq = 1; // 新分類 key 自增序號
  const newCatKey = () => 'cat' + (_catSeq++) + '_' + Date.now().toString(36);

  const CKEYS = []; // 動態：一般分類 key 清單（不含 unsplit），由 rebuildCats() 填入
  let CATS = {};    // 動態：依 key 查找（含 unsplit）

  const SK      = 'kakeibo_v2';
  const SK_LBL  = 'kakeibo_labels';
  const SK_ICONS = 'kakeibo_icons';
  const SK_CATS = 'kakeibo_cats_list';
  const SK_BDG  = 'kakeibo_budget';
  const SK_MODE = 'kakeibo_budget_mode';
  const SK_CAT  = 'kakeibo_last_cat';  // 最後使用的分類（不含待拆帳）
  const IDB_NAME = 'kakeibo_db';
  const IDB_VER  = 1;
  const IDB_STORE = 'data';

  /* ── IndexedDB 層 ── */
  let _idb = null;

  function openIDB() {
    return new Promise((res, rej) => {
      if (_idb) { res(_idb); return; }
      const req = indexedDB.open(IDB_NAME, IDB_VER);
      req.onupgradeneeded = e => {
        const db = e.target.result;
        if (!db.objectStoreNames.contains(IDB_STORE))
          db.createObjectStore(IDB_STORE);
      };
      req.onsuccess = e => { _idb = e.target.result; res(_idb); };
      req.onerror   = () => rej(req.error);
    });
  }

  function idbSet(key, val) {
    return openIDB().then(db => new Promise((res, rej) => {
      const tx = db.transaction(IDB_STORE, 'readwrite');
      tx.objectStore(IDB_STORE).put(val, key);
      tx.oncomplete = res;
      tx.onerror    = () => rej(tx.error);
    })).catch(err => { console.error('[IDB] idbSet failed:', key, err); });
  }

  function idbGet(key) {
    return openIDB().then(db => new Promise((res, rej) => {
      const req = db.transaction(IDB_STORE, 'readonly').objectStore(IDB_STORE).get(key);
      req.onsuccess = () => res(req.result);
      req.onerror   = () => rej(req.error);
    })).catch(() => null);
  }

  /* ── 工具函式（雙寫：IDB 主要 + localStorage 備份）── */
  const save = () => {
    const v = JSON.stringify(recs);
    let lsOk = false;
    // 同時追蹤 IDB（主要）和 localStorage（備份），兩邊都失敗才警告
    idbSet(SK, v).catch(() => {
      // IDB 失敗時，確認 localStorage 是否也已失敗
      if (!lsOk) {
        console.error('[save] Both IDB and localStorage failed — storage may be full');
        toast('⚠️ 儲存失敗！請立即匯出備份');
      }
    });
    try { localStorage.setItem(SK, v); lsOk = true; } catch(e) {
      lsOk = false;
    }
  };
  const saveCats = () => {
    const v = JSON.stringify(CATS_LIST);
    idbSet(SK_CATS, v);
    try { localStorage.setItem(SK_CATS, v); } catch(e) {}
    fbSyncMeta(SK_CATS, v);
  };
  const saveBdg = () => {
    const v = String(budget);
    idbSet(SK_BDG, v);
    try { localStorage.setItem(SK_BDG, v); } catch(e) {}
    fbSyncMeta(SK_BDG, v);
  };
  const saveMode = () => {
    const v = showBudgetTotal ? '1' : '0';
    idbSet(SK_MODE, v);
    try { localStorage.setItem(SK_MODE, v); } catch(e) {}
  };

  /* ── 讀取（優先 IDB，fallback localStorage，雙向補齊）── */
  async function loadAll() {
    // recs
    try {
      const idbVal = await idbGet(SK);
      const lsVal  = localStorage.getItem(SK);
      if (idbVal) {
        recs = JSON.parse(idbVal);
        if (!lsVal) { try { localStorage.setItem(SK, idbVal); } catch(e) {} } // IDB 有、LS 沒有 → 補 LS
      } else if (lsVal) {
        recs = JSON.parse(lsVal);
        idbSet(SK, lsVal); // LS 有、IDB 沒有 → 補 IDB（含遷移舊資料）
      }
    } catch(e) {
      try { const ls = localStorage.getItem(SK); if (ls) recs = JSON.parse(ls); } catch(e2) {}
    }
    // 分類清單（新格式，含順序、新增/刪除）
    let catsListLoaded = false;
    try {
      const idbVal = await idbGet(SK_CATS);
      const lsVal  = localStorage.getItem(SK_CATS);
      const v = idbVal || lsVal;
      if (v) {
        const saved = JSON.parse(v);
        if (Array.isArray(saved) && saved.length > 0) {
          CATS_LIST = saved;
          catsListLoaded = true;
        }
        if (idbVal && !lsVal) { try { localStorage.setItem(SK_CATS, idbVal); } catch(e) {} }
        if (!idbVal && lsVal) { idbSet(SK_CATS, lsVal); }
      }
    } catch(e) {}

    // 舊版相容：若沒有新格式分類清單，套用舊版 labels/icons 覆寫到預設分類上
    if (!catsListLoaded) {
      try {
        const idbVal = await idbGet(SK_LBL);
        const lsVal  = localStorage.getItem(SK_LBL);
        const v = idbVal || lsVal;
        if (v) {
          const saved = JSON.parse(v);
          CATS_LIST.forEach(c => { if (saved[c.key]) c.lbl = saved[c.key]; });
        }
      } catch(e) {}
      try {
        const idbVal = await idbGet(SK_ICONS);
        const lsVal  = localStorage.getItem(SK_ICONS);
        const v = idbVal || lsVal;
        if (v) {
          const saved = JSON.parse(v);
          CATS_LIST.forEach(c => { if (saved[c.key]) c.icon = saved[c.key]; });
        }
      } catch(e) {}
    }

    // bdgPlan
    try {
      const idbVal = await idbGet(SK_BDGPLAN);
      const lsVal  = localStorage.getItem(SK_BDGPLAN);
      const v = idbVal || lsVal;
      if (v) {
        const saved = JSON.parse(v);
        if (typeof saved === 'object' && !Array.isArray(saved)) {
          bdgPlan = saved;
          Object.values(bdgPlan).forEach(p => {
            (p.subs||[]).forEach(s => { if (s.id >= _subId) _subId = s.id + 1; });
          });
        }
        if (idbVal && !lsVal) { try { localStorage.setItem(SK_BDGPLAN, idbVal); } catch(e) {} }
        if (!idbVal && lsVal) { idbSet(SK_BDGPLAN, lsVal); }
      }
    } catch(e) {}

    // budget
    try {
      const idbVal = await idbGet(SK_BDG);
      const lsVal  = localStorage.getItem(SK_BDG);
      const v = idbVal !== null && idbVal !== undefined ? idbVal : lsVal;
      if (v !== null && v !== undefined) budget = parseInt(v, 10) || 0;
    } catch(e) {}

    // budget mode
    try {
      const idbVal = await idbGet(SK_MODE);
      const lsVal  = localStorage.getItem(SK_MODE);
      const v = idbVal !== null && idbVal !== undefined ? idbVal : lsVal;
      if (v !== null && v !== undefined) showBudgetTotal = (v === '1');
    } catch(e) {}
  }

  /* ── 長按偵測（touchstart / mousedown） ── */
  function setupLongPress() {
    const grid = document.getElementById('kbGrid');
    let pressTimer     = null;
    let pressedBtn     = null;
    let longPressFired = false;
    let usingTouch     = false; // 偵測到 touch 事件後，忽略後續合成的 mouse 事件，避免重複觸發
    let startX = 0, startY = 0;
    const MOVE_THRESHOLD = 10; // px

    const clearPressTimer = () => {
      clearTimeout(pressTimer);
      pressTimer = null;
    };

    const endPress = () => {
      if (pressedBtn) pressedBtn.classList.remove('pressed');
      pressedBtn = null;
      clearPressTimer();
    };

    // 長按 → 開啟「編輯分類」視窗（改名 / 換圖示 / 刪除 都在裡面）
    const startPress = (btn) => {
      longPressFired = false;
      pressedBtn = btn;
      btn.classList.add('pressed');
      clearPressTimer();
      pressTimer = setTimeout(() => {
        longPressFired = true;
        if (pressedBtn) pressedBtn.classList.remove('pressed');
        openRename(btn.dataset.c);
      }, 480);
    };

    const movePress = (clientX, clientY) => {
      if (!pressTimer) return;
      if (Math.abs(clientX - startX) > MOVE_THRESHOLD || Math.abs(clientY - startY) > MOVE_THRESHOLD) {
        endPress();
      }
    };

    // Touch
    grid.addEventListener('touchstart', e => {
      const btn = e.target.closest('.cbt');
      if (!btn) return;
      usingTouch = true;
      const t = e.touches[0];
      startX = t.clientX;
      startY = t.clientY;
      startPress(btn);
    }, { passive: true });

    grid.addEventListener('touchmove', e => {
      const t = e.touches[0];
      movePress(t.clientX, t.clientY);
    }, { passive: true });

    grid.addEventListener('touchend', endPress, { passive: true });
    grid.addEventListener('touchcancel', endPress, { passive: true });
    // 觸控結束後短暫標記，防止合成 mouse 事件重複觸發；500ms 後重置，讓滑鼠可繼續使用
    grid.addEventListener('touchend',    () => { setTimeout(() => { usingTouch = false; }, 500); }, { passive: true });
    grid.addEventListener('touchcancel', () => { setTimeout(() => { usingTouch = false; }, 500); }, { passive: true });

    // Mouse（桌機；若裝置剛觸發過 touch，忽略合成滑鼠事件避免重複）
    grid.addEventListener('mousedown', e => {
      if (usingTouch) return;
      const btn = e.target.closest('.cbt');
      if (!btn) return;
      startX = e.clientX;
      startY = e.clientY;
      startPress(btn);
    });

    grid.addEventListener('mousemove', e => {
      if (usingTouch) return;
      movePress(e.clientX, e.clientY);
    });

    grid.addEventListener('mouseup', () => { if (!usingTouch) endPress(); });
    grid.addEventListener('mouseleave', () => { if (!usingTouch) endPress(); });

    // 點擊 → 選取分類。用原生 click 事件，瀏覽器保證會正確區分「點擊」與「捲動／長按」，不需要自己判斷。
    grid.addEventListener('click', e => {
      const btn = e.target.closest('.cbt');
      if (!btn) return;
      if (longPressFired) { longPressFired = false; return; } // 這次點擊是長按結束觸發的，不當作選取
      sc(btn.dataset.c);
    });

  }

  /* 結構: bdgPlan[catKey] = { budget, subs:[{id,name,budget}], open } */
  const SK_BDGPLAN = 'kakeibo_bdgplan';
  let bdgPlan = {}; // keyed by catKey

  function initBdgPlan() {
    CKEYS.forEach(k => {
      if (!bdgPlan[k]) bdgPlan[k] = { budget: 0, subs: [], open: false };
    });
  }

  const saveBdgPlan = () => {
    const v = JSON.stringify(bdgPlan);

  /* ── 預算規劃渲染 ── */
  function getBdgSpending() {
    const mrs = getMrs();
    const out = {};
    mrs.forEach(r => {
      if (!r.bdgRef || r.exempt) return; // 排除 exempt
      const ck = r.bdgRef.catKey;
      out[ck] = (out[ck] || 0) + r.amt;
      if (r.bdgRef.subId !== undefined) {
        const sk = ck + ':' + r.bdgRef.subId;
        out[sk] = (out[sk] || 0) + r.amt;
      }
    });
    return out;
  }

  function renderBdgPlan() {

      plan.budget = plan.subs.reduce((s, sub) => s + (sub.budget || 0), 0);
    });

    CKEYS.forEach(k => {

      itemsHtml += `<div class="bdgp-item">
