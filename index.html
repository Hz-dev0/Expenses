  function renameBdgSub(k, sid, val) {
    const plan = bdgPlan[k];
    if (!plan) return;
    const s = plan.subs.find(x => x.id === sid);
    if (!s || !val.trim()) return;
    s.name = val.trim();
    saveBdgPlan();
  }

  function setBdgSubBudget(k, sid, val) {
    const plan = bdgPlan[k];
    if (!plan) return;
    const s = plan.subs.find(x => x.id === sid);
    if (!s) return;
    s.budget = parseInt(val, 10) || 0;
    saveBdgPlan();
    // 只更新 header 顯示，不重新渲染整個面板（避免輸入框焦點丟失）
    const newTotal = plan.subs.reduce((a, x) => a + (x.budget||0), 0);
    plan.budget = newTotal;
  }

  function toggleBdgItem(k) {
    bdgPlan[k].open = !bdgPlan[k].open;
    saveBdgPlan();
    renderBdgPlan();
  }

  function setBdgBudget(k, val) {
    bdgPlan[k].budget = parseInt(val, 10) || 0;
    saveBdgPlan();
  }

  function addBdgSub(k) {
    const nameEl = document.getElementById('bdgp-si-' + k);
    const budEl  = document.getElementById('bdgp-sb-' + k);
    const name   = nameEl ? nameEl.value.trim() : '';
    if (!name) { toast('請輸入細分類名稱'); return; }
    const budget = parseInt(budEl ? budEl.value : '0', 10) || 0;
    bdgPlan[k].subs.push({ id: _subId++, name, budget });
    saveBdgPlan();
    renderBdgPlan();
    toast('已新增：' + name);
  }

  function delBdgSub(k, sid) {
    bdgPlan[k].subs = bdgPlan[k].subs.filter(s => s.id !== sid);
    // 將有此細分類關聯的支出改為只關聯父項
    recs.forEach(r => {
      if (r.bdgRef && r.bdgRef.catKey === k && r.bdgRef.subId === sid) {
        delete r.bdgRef.subId;
      }
    });
    save();
    saveBdgPlan();
    renderBdgPlan();
  }

  /* ── 樹狀關聯 Modal ── */
  let _treeRecId = null;

  function openTreePicker(recId) {
    _treeRecId = recId;
    const rec = recs.find(r => r.id === recId);
    renderTreeContent(rec ? rec.bdgRef : null);
    document.getElementById('treeOverlay').classList.add('open');
  }

  function closeTreePicker() {
    document.getElementById('treeOverlay').classList.remove('open');
    _treeRecId = null;
  }

  /* ── 待拆帳 Modal ── */
  let _splitRecId   = null;
  let _splitSelCat  = null;
  let _splitSelSub  = null;   // null = 選大分類本身，數字 = subId
  let _splitExpCat  = null;   // 目前展開細分類的大分類 key

  function openSplitModal(recId) {
    const r = recs.find(x => x.id === recId);
    if (!r || r.cat !== UNSPLIT_KEY) return;
    _splitRecId  = recId;
    _splitSelCat = CKEYS[0] || null;
    _splitSelSub = null;
    // 若預設選中的分類有子分類，自動展開
    const _defaultPlan = _splitSelCat ? bdgPlan[_splitSelCat] : null;
    _splitExpCat = (_defaultPlan && _defaultPlan.subs && _defaultPlan.subs.length > 0) ? _splitSelCat : null;
    document.getElementById('splitSub').textContent =
      (r.note ? r.note + ' · ' : '') + '原始金額 NT$' + r.amt.toLocaleString();
    renderSplitModal();
    document.getElementById('splitOverlay').classList.add('open');
    // 調整 box 位置避免鍵盤遮擋
    _splitAdjustForKeyboard();
    setTimeout(() => {
      document.getElementById('splitAmtInput').focus();
    }, 150);
  }

  function _splitAdjustForKeyboard() {
    const box = document.getElementById('splitBox');
    if (!box) return;
    const vv = window.visualViewport;
    if (!vv) return;
    const adjust = () => {
      const offsetFromBottom = window.innerHeight - (vv.offsetTop + vv.height);
      box.style.marginBottom = offsetFromBottom > 0 ? offsetFromBottom + 'px' : '0px';
    };
    adjust();
    vv.addEventListener('resize', adjust);
    vv.addEventListener('scroll', adjust);
    // 關閉時清理
    const cleanup = () => {
      vv.removeEventListener('resize', adjust);
      vv.removeEventListener('scroll', adjust);
      box.style.marginBottom = '0px';
      document.getElementById('splitOverlay').removeEventListener('split-close', cleanup);
    };
    document.getElementById('splitOverlay').addEventListener('split-close', cleanup, { once: true });
  }

  function closeSplitModal() {
    document.getElementById('splitOverlay').classList.remove('open');
    _splitRecId  = null;
    _splitSelCat = null;
    _splitSelSub = null;
    _splitExpCat = null;
    render();
  }

  function renderSplitModal() {
    const r = recs.find(x => x.id === _splitRecId);
    if (!r) { closeSplitModal(); return; }
    const remain = unsplitRemaining(r);

    document.getElementById('splitRemainNum').textContent = remain.toLocaleString();



    // 分類選擇格（支援子分類展開）
    if (!_splitSelCat || !CKEYS.includes(_splitSelCat)) _splitSelCat = CKEYS[0] || null;
    const grid = document.getElementById('splitCatGrid');
    let gridHTML = '';
    CKEYS.forEach(k => {
      const c = CATS[k];
      const plan = bdgPlan[k];
      const hasSubs = plan && plan.subs && plan.subs.length > 0;
      const isCatSel = k === _splitSelCat;
      gridHTML += `<button type="button" class="split-cat-btn${isCatSel ? ' sel' : ''}${hasSubs ? ' has-subs' : ''}" onclick="selectSplitCat('${k}')">
        <span>${c.icon}</span><span class="lbl">${esc(c.lbl)}${hasSubs ? ' ▾' : ''}</span>
      </button>`;
    });
    grid.innerHTML = gridHTML;

    // 子分類區塊（獨立在 grid 之外，避免 grid 欄位問題）
    const subsWrap = document.getElementById('splitSubsWrap');
    const expPlan = _splitExpCat ? bdgPlan[_splitExpCat] : null;
    const expHasSubs = expPlan && expPlan.subs && expPlan.subs.length > 0;
    if (_splitExpCat && expHasSubs) {
      let subsHTML = '';
      expPlan.subs.forEach(s => {
        const isSub = _splitSelCat === _splitExpCat && _splitSelSub === s.id;
        subsHTML += `<button type="button" class="split-sub-btn${isSub ? ' sel' : ''}" onclick="selectSplitSub('${_splitExpCat}',${s.id})">${esc(s.name)}</button>`;
      });
      subsWrap.innerHTML = subsHTML;
      subsWrap.style.display = 'flex';
    } else {
      subsWrap.innerHTML = '';
      subsWrap.style.display = 'none';
    }

    const confirmBtn = document.getElementById('splitConfirmBtn');
    confirmBtn.disabled = remain <= 0;
    confirmBtn.textContent = remain <= 0 ? '已全部拆分完成' : '確認拆分這筆';

    document.getElementById('splitAmtInput').max = remain;
  }

  function selectSplitCat(k) {
    const plan = bdgPlan[k];
    const hasSubs = plan && plan.subs && plan.subs.length > 0;
    if (hasSubs) {
      // 有子分類：展開/收合切換；若已展開且再按一次 = 選大分類本身
      if (_splitExpCat === k) {
        if (_splitSelCat === k) {
          // 已是大分類選中狀態 → 收合
          _splitExpCat = null;
        } else {
          // 展開中但尚未選 → 選大分類本身
          _splitSelCat = k;
          _splitSelSub = null;
        }
      } else {
        _splitExpCat = k;
        _splitSelCat = k;
        _splitSelSub = null;
      }
    } else {
      // 無子分類：直接選取
      _splitSelCat = k;
      _splitSelSub = null;
      _splitExpCat = null;
    }
    renderSplitModal();
  }

  function selectSplitSub(k, subId) {
    _splitSelCat = k;
    _splitSelSub = subId;
    renderSplitModal();
  }

  function confirmSplitPortion() {
    const r = recs.find(x => x.id === _splitRecId);
    if (!r) return;
    const remain = unsplitRemaining(r);
    if (remain <= 0) { toast('已經全部拆分完成了'); return; }

    const inputEl = document.getElementById('splitAmtInput');
    let v = parseFloat(inputEl.value);
    if (!_splitSelCat || !CKEYS.includes(_splitSelCat)) { toast('請選擇分類'); return; }
    if (!v || v <= 0) { v = remain; }  // 未輸入金額 → 全部剩餘金額
    v = Math.round(v * 100) / 100;
    if (v > remain + 0.001) { toast('金額超過剩餘未拆金額'); return; }

    // 建立新紀錄（同日期、指定分類）
    const subName = (_splitSelSub !== null && bdgPlan[_splitSelCat])
      ? (bdgPlan[_splitSelCat].subs.find(s => s.id === _splitSelSub) || {}).name || '' : '';
    const catLabel = CATS[_splitSelCat].lbl + (subName ? ' › ' + subName : '');
    const newRec = { id: _nextId++, date: r.date, cat: _splitSelCat, amt: v, note: r.note || '' };
    if (_splitSelSub !== null) newRec.bdgRef = { catKey: _splitSelCat, subId: _splitSelSub };
    recs.push(newRec);

    // 扣減原始待拆帳金額
    r.amt = Math.round((r.amt - v) * 100) / 100;

    // 若已全部拆完，刪除原始待拆帳紀錄並關閉
    if (r.amt <= 0) {
      const delId = r.id;
      recs = recs.filter(x => x.id !== r.id);
      save();
      fbSyncRec(newRec);
      fbDeleteRec(delId);
      toast('🎉 已全部拆分完成！');
      closeSplitModal();
      return;
    }

    save();
    fbSyncRec(newRec);
    fbSyncRec(r);
    inputEl.value = '';
    _splitSelSub = null;
    renderSplitModal();
    toast('已拆分 $' + v.toLocaleString() + ' 到 ' + catLabel);
  }



  function renderTreeContent(cur) {
    let html = '';
    CKEYS.forEach(k => {
      const c    = CATS[k];
      const plan = bdgPlan[k];
      const isParentSel = cur && cur.catKey === k && cur.subId === undefined;
      const hasChildren = plan.subs.length > 0;

      let childrenHtml = '';
      plan.subs.forEach(s => {
        const isSel = cur && cur.catKey === k && cur.subId === s.id;
        childrenHtml += `<button class="tree-child-btn" onclick="selectBdgRef('${k}',${s.id})">
          <span class="tree-c-dot"></span>
          <span class="tree-c-name">${esc(s.name)}</span>
          ${isSel ? '<span class="tree-c-check">✓</span>' : ''}
        </button>`;
      });

      html += `<div class="tree-parent">
        <button class="tree-parent-btn" onclick="treeToggleParent('${k}')">
          <span class="tree-p-icon">${c.icon}</span>
          <span class="tree-p-name">${esc(c.lbl)}</span>
          ${isParentSel ? '<span class="tree-p-check">✓</span>' : ''}
          ${hasChildren ? `<span class="tree-p-arrow" id="tpa-${k}">▶</span>` : ''}
        </button>
        ${hasChildren ? `<div class="tree-children" id="tpc-${k}">${childrenHtml}</div>` : ''}
      </div>`;
    });
    html += `<button class="tree-none-btn" onclick="selectBdgRef(null)">不關聯 / 移除關聯</button>`;
    document.getElementById('treeContent').innerHTML = html;
  }

  function treeToggleParent(k) {
    const ch = document.getElementById('tpc-' + k);
    const ar = document.getElementById('tpa-' + k);
    if (!ch) {
      // no children → directly select parent
      selectBdgRef(k, undefined);
      return;
    }
    const isOpen = ch.classList.contains('open');
    document.querySelectorAll('.tree-children').forEach(el => el.classList.remove('open'));
    document.querySelectorAll('.tree-p-arrow').forEach(el => el.classList.remove('open'));
    if (!isOpen) { ch.classList.add('open'); if (ar) ar.classList.add('open'); }
    else selectBdgRef(k, undefined);
  }

  function selectBdgRef(catKey, subId) {
    if (_treeRecId === null) return;
    const rec = recs.find(r => r.id === _treeRecId);
    if (!rec) return;
    if (!catKey) {
      delete rec.bdgRef;
      toast('已移除關聯');
    } else {
      rec.bdgRef = subId !== undefined ? { catKey, subId } : { catKey };
      const c = CATS[catKey];
      const plan = bdgPlan[catKey];
      const sub  = subId !== undefined ? plan.subs.find(s => s.id === subId) : null;
      toast('已關聯：' + c.icon + ' ' + c.lbl + (sub ? ' › ' + sub.name : ''));
    }
    save();
    if (rec) fbSyncRec(rec);
    render();
    closeTreePicker();
  }

  /* ── 更新日期標籤顯示 ── */
  function updateDateLbl() {
    const v = document.getElementById('dateInp').value;
    const lbl = document.getElementById('dateLbl');
    if (!v) { lbl.textContent = '選擇日期'; return; }
    const d = new Date(v + 'T00:00:00');
    lbl.textContent = d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric', weekday: 'short' });
  }

  /* ── Firebase 初始化入口（登入後呼叫） ── */
  window._fbLoadAndInit = async () => {
    // 優先從 Firebase 載入資料，沒有再 fallback 本地
    await fbLoadAll();
    // 若 Firebase 也沒有資料，嘗試本地
    if (recs.length === 0) await loadAll();
    await init();
  };

  /* ── 初始化 ── */
  async function init() {
    // 防止重複初始化（Firebase 登入後會再呼叫一次）
    if (window._initDone) {
      // 只重新載入資料和重繪，不重新綁定事件
      rebuildCats();
      if (CKEYS.length > 0 && !CKEYS.includes(cat)) cat = CKEYS[0];
      initBdgPlan();
      if (recs.length > 0) _nextId = Math.max(...recs.map(r => r.id)) + 1;
      renderCatBtns();
      render();
      return;
    }
    window._initDone = true;
    rebuildCats();
    // 還原上次使用的分類（跳過待拆帳）
    try {
      const saved = localStorage.getItem(SK_CAT);
      if (saved && CKEYS.includes(saved)) cat = saved;
    } catch(e) {}
    if (CKEYS.length > 0 && !CKEYS.includes(cat)) cat = CKEYS[0];
    initBdgPlan(); // 確保每個 catKey 都有預算結構
    // 從現有資料的最大 id 繼續，避免重複
    if (recs.length > 0) _nextId = Math.max(...recs.map(r => r.id)) + 1;

    // 資料重置偵測：若上次有記帳但這次 recs 是空的，警告可能被系統清除
    const SK_LAST = 'kakeibo_last_open';
    const lastHadData = localStorage.getItem(SK_LAST) === '1';
    if (lastHadData && recs.length === 0) {
      setTimeout(() => toast('⚠️ 偵測到資料可能被清除，請確認或匯入備份'), 500);
    }
    try { localStorage.setItem(SK_LAST, recs.length > 0 ? '1' : '0'); } catch(e) {}

    // 請求持久化儲存 + 空間偵測
    if (navigator.storage) {
      if (navigator.storage.persist) {
        navigator.storage.persist().catch(() => {});
      }
      if (navigator.storage.estimate) {
        navigator.storage.estimate().then(est => {
          const remainingMB = (est.quota - est.usage) / 1024 / 1024;
          if (remainingMB < 100) {
            toast('⚠️ 裝置空間不足，記帳資料可能有遺失風險');
          }
        }).catch(() => {});
      }
    }

    const now = new Date();
    vy = now.getFullYear();
    vm = now.getMonth();
    document.getElementById('dateInp').value = fmtD(now);
    updateDateLbl();
    document.getElementById('dateInp').addEventListener('change', updateDateLbl);

    renderCatBtns();
    setupLongPress();
    setupListLongPress();
    setupEmojiPicker();

    // 月份按鈕
    document.getElementById('btnPrevM').addEventListener('touchstart', e => { e.preventDefault(); chM(-1); }, { passive: false });
    document.getElementById('btnNextM').addEventListener('touchstart', e => { e.preventDefault(); chM(1);  }, { passive: false });
    document.getElementById('btnPrevM').addEventListener('click', () => chM(-1));
    document.getElementById('btnNextM').addEventListener('click', () => chM(1));

    // Tab 按鈕
    document.getElementById('tabList').onclick = () => goTab('list');
    document.getElementById('tabAna').onclick  = () => goTab('ana');
    document.getElementById('tabBdgPlan').onclick = () => goTab('bdgplan');

    // tree overlay
    document.getElementById('treeCancelBtn').onclick = closeTreePicker;
    document.getElementById('treeOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('treeOverlay')) closeTreePicker();
    });

    // split overlay (待拆帳)
    document.getElementById('splitOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('splitOverlay')) closeSplitModal();
    });

    // backup menu overlay
    const bmo = document.getElementById('backupMenuOverlay');
    bmo.style.display = 'flex';
    bmo.style.display = 'none';
    bmo.addEventListener('click', e => { if (e.target === bmo) closeBackupMenu(); });

    // month picker
    document.getElementById('mpYearPrev').onclick = () => { mpYear--; renderMpYear(); };
    document.getElementById('mpYearNext').onclick = () => { mpYear++; renderMpYear(); };
    document.getElementById('mpCancelBtn').onclick = closeMp;
    document.getElementById('monthPickerOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('monthPickerOverlay')) closeMp();
    });
    document.getElementById('mLabel').onclick = openMonthPicker;


    // budget modal
    document.getElementById('budgetCancelBtn').onclick = closeBudget;
    document.getElementById('budgetOkBtn').onclick     = confirmBudget;
    document.getElementById('budgetInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmBudget();
      if (e.key === 'Escape') closeBudget();
    });
    document.getElementById('budgetOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('budgetOverlay')) closeBudget();
    });

    document.getElementById('editNoteCancelBtn').onclick = closeEditNote;
    document.getElementById('editNoteOkBtn').onclick     = confirmEditNote;
    document.getElementById('editNoteInp').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmEditNote();
      if (e.key === 'Escape') closeEditNote();
    });
    document.getElementById('editNoteOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('editNoteOverlay')) closeEditNote();
    });

    // 長按右上角金額 → 設定上限
    setupTotalLongPress();

    setupSwipe();
    setupMonthSwipe();

    // 數字鍵盤：touchstart event delegation（只綁在數字鍵區域，不要綁在整個 kbGrid，
    // 否則 { passive:false } 會讓瀏覽器對右側可捲動分類清單也要等 JS 跑完才能決定要不要捲動，導致卡頓/無法捲動）
    const grid = document.querySelector('.kb-numgrid');
    let delInterval = null;
    let delTimeout  = null;

    const startDel = () => {
      nd();
      delTimeout = setTimeout(() => {
        delInterval = setInterval(() => { nd(); }, 80);
      }, 400);
    };
    const stopDel = () => {
      clearTimeout(delTimeout);
      clearInterval(delInterval);
      delTimeout = delInterval = null;
    };

    grid.addEventListener('touchstart', e => {
      const btn = e.target.closest('[data-n],[data-del],[data-ok]');
      if (!btn) return;
      e.preventDefault();
      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 90);
      if (btn.dataset.n   !== undefined) ni(btn.dataset.n);
      else if (btn.dataset.del !== undefined) startDel();
      else if (btn.dataset.ok  !== undefined) addRec();
    }, { passive: false });

    grid.addEventListener('touchend',    e => { if (e.target.closest('[data-del]')) stopDel(); }, { passive: true });
    grid.addEventListener('touchcancel', e => { if (e.target.closest('[data-del]')) stopDel(); }, { passive: true });

    // 桌機 mousedown fallback（數字鍵）
    grid.addEventListener('mousedown', e => {
      const btn = e.target.closest('[data-n],[data-del],[data-ok]');
      if (!btn) return;
      if (btn.dataset.n   !== undefined) ni(btn.dataset.n);
      else if (btn.dataset.del !== undefined) startDel();
      else if (btn.dataset.ok  !== undefined) addRec();
    });
    grid.addEventListener('mouseup',    e => { if (e.target.closest('[data-del]')) stopDel(); });
    grid.addEventListener('mouseleave', e => { if (delInterval || delTimeout) stopDel(); });

    // Rename Modal 按鈕
    document.getElementById('renameCancelBtn').onclick = closeRename;
    document.getElementById('renameOkBtn').onclick     = confirmRename;
    document.getElementById('renameInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmRename();
      if (e.key === 'Escape') closeRename();
    });
    // 點擊背景關閉
    document.getElementById('renameOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('renameOverlay')) closeRename();
    });

    render();
  }

  /* ── 數字輸入 ── */
  function ni(v) {
    if (inp.length >= 6) return;
    if (v === '0' && inp === '') return;
    inp += v;
    ud();
  }

  function nd() {
    inp = inp.slice(0, -1);
    ud();
  }

  function ud() {
    const a = document.getElementById('aN');
    const c = document.getElementById('kc');
    if (!inp) {
      a.textContent = '0';
      a.className   = 'ph';
      c.style.display = 'inline-block';
    } else {
      a.textContent = inp;
      a.className   = '';
      c.style.display = 'none';
    }
  }

  /* ── 選分類 ── */
  function sc(id) {
    cat = (cat === id) ? UNSPLIT_KEY : id; // 再點一次目前選取的分類 = 取消分類，改列為待拆帳
    if (cat !== UNSPLIT_KEY) {
      try { localStorage.setItem(SK_CAT, cat); } catch(e) {}
    }
    document.querySelectorAll('.cbt').forEach(b => b.classList.toggle('on', b.dataset.c === cat));
  }

  /* ── 新增記帳 ── */
  function addRec() {
    const amt = parseInt(inp, 10);
    if (!amt || amt <= 0) { toast('請輸入金額'); return; }

    const dv = document.getElementById('dateInp').value;
    if (!dv) { toast('請選日期'); return; }

    const note = document.getElementById('noteInp').value.trim();
    const newRec = { id: _nextId++, date: dv, cat, amt, note };
    recs.unshift(newRec);
    save();
    fbSyncRec(newRec);

    inp = '';
    ud();
    document.getElementById('noteInp').value = '';

    const d = new Date(dv + 'T00:00:00');
    vy = d.getFullYear();
    vm = d.getMonth();
    render();
    toast(CATS[cat].icon + ' NT$' + amt.toLocaleString());
  }

  /* ── 切換免計入預算 ── */
  function toggleExempt(id) {
    const r = recs.find(r => r.id === id);
    if (!r) return;
    r.exempt = !r.exempt;
    save();
    fbSyncRec(r);
    render();
    toast(r.exempt ? '已從預算中排除' : '已計入預算');
  }

  /* ── 支出上限 Modal ── */
  function openBudget() {
    const el = document.getElementById('budgetInput');
    el.value = budget > 0 ? budget : '';
    document.getElementById('budgetOverlay').classList.add('open');
    setTimeout(() => { el.focus(); el.select(); }, 120);
  }

  function closeBudget() {
    document.getElementById('budgetOverlay').classList.remove('open');
    document.getElementById('budgetInput').blur();
  }

  function confirmBudget() {
    const v = parseInt(document.getElementById('budgetInput').value, 10);
    budget = (isNaN(v) || v <= 0) ? 0 : Math.min(v, 999999);
    saveBdg();
    closeBudget();
    render();
    toast(budget > 0 ? '上限設為 NT$' + budget.toLocaleString() : '已取消上限');
  }

  /* ── 長按右上角金額 → 設定上限 ── */
  function setupTotalLongPress() {
    const el = document.querySelector('[onclick="toggleTotalDisplay()"]');
    if (!el) return;
    let timer = null;

    el.addEventListener('touchstart', () => {
      timer = setTimeout(() => {
        timer = null;
        if (navigator.vibrate) navigator.vibrate(40);
        openBudget();
      }, 500);
    }, { passive: true });

    el.addEventListener('touchend', () => { clearTimeout(timer); timer = null; }, { passive: true });
    el.addEventListener('touchcancel', () => { clearTimeout(timer); timer = null; }, { passive: true });
    el.addEventListener('touchmove', () => { clearTimeout(timer); timer = null; }, { passive: true });

    // 桌機：右鍵開設定
    el.addEventListener('contextmenu', e => { e.preventDefault(); openBudget(); });
  }

  /* ── ri-info 長按 = 編輯備註，短按 = 原有行為 ── */
  const _lpTimers = new WeakMap();
  function riLongPressStart(e, el) {
    const t = setTimeout(() => {
      _lpTimers.set(el, null);
      if (navigator.vibrate) navigator.vibrate(40);
      openEditNote(parseInt(el.dataset.id));
    }, 480);
    _lpTimers.set(el, t);
  }
  function riLongPressEnd(e, el) {
    const t = _lpTimers.get(el);
    if (t) { clearTimeout(t); _lpTimers.set(el, 'tap'); }
  }
  function riLongPressCancel(el) {
    const t = _lpTimers.get(el);
    if (t && t !== 'tap') clearTimeout(t);
    _lpTimers.set(el, null);
  }
  function riInfoClick(e, el) {
    const state = _lpTimers.get(el);
    // 如果是剛完成長按（timer 已被設為 null），不執行短按
    if (state === null) { _lpTimers.delete(el); return; }
    const id     = parseInt(el.dataset.id);
    const action = el.dataset.action;
    if (action === 'split')  openSplitModal(id);
    else                     openTreePicker(id);
  }

  /* ── 編輯備註 ── */
  let _editNoteRecId = null;

  function openEditNote(id) {
    const r = recs.find(r => r.id === id);
    if (!r) return;
    _editNoteRecId = id;
    const inp = document.getElementById('editNoteInp');
    inp.value = r.note || '';
    document.getElementById('editNoteOverlay').classList.add('open');
    setTimeout(() => { inp.focus(); inp.select(); }, 120);
  }

  function closeEditNote() {
    document.getElementById('editNoteOverlay').classList.remove('open');
    _editNoteRecId = null;
  }

  function confirmEditNote() {
    const r = recs.find(r => r.id === _editNoteRecId);
    if (!r) { closeEditNote(); return; }
    r.note = document.getElementById('editNoteInp').value.trim();
    save();
    fbSyncRec(r);
    render();
    closeEditNote();
    toast('備註已更新');
  }

  /* ── 刪除記帳 ── */
  function delRec(id) {
    recs = recs.filter(r => r.id !== id);
    save();
    fbDeleteRec(id);
    render();
  }

  /* ── 切換月份 ── */
  function chM(d) {
    vm += d;
    if (vm > 11) { vm = 0; vy++; }
    if (vm < 0)  { vm = 11; vy--; }
    collapsed = {};
    // 切換月份時同步清空分析頁展開狀態，行為與折疊狀態一致
    Object.keys(anaOpen).forEach(k => delete anaOpen[k]);
    const cls = d > 0 ? 'slide-in-right' : 'slide-in-left';
    const panel = ctab === 'list' ? document.getElementById('listPanel') : document.getElementById('anaPanel');
    render();
    panel.classList.remove('slide-in-left', 'slide-in-right');
    void panel.offsetWidth;
    panel.classList.add(cls);
    setTimeout(() => panel.classList.remove(cls), 300);
  }

  /* ── 切換 Tab ── */
  function goTab(t, dir) {
    if (ctab === t) return;
    ctab = t;
    document.getElementById('tabList').classList.toggle('on', t === 'list');
    document.getElementById('tabAna').classList.toggle('on', t === 'ana');
    document.getElementById('tabBdgPlan').classList.toggle('on', t === 'bdgplan');
    const wrap = document.getElementById('panelWrap');
    if (t === 'list')      wrap.style.transform = 'translateX(0)';
    else if (t === 'ana')  wrap.style.transform = 'translateX(-33.333%)';
    else                   wrap.style.transform = 'translateX(-66.666%)';
    render();
  }

  /* ── 折疊日期群組 ── */
  function toggleDate(date) {
    collapsed[date] = !collapsed[date];
    const items = document.getElementById('di-' + date);
    const arrow = document.getElementById('da-' + date);
    if (items) items.style.display = collapsed[date] ? 'none' : 'block';
    if (arrow) arrow.textContent   = collapsed[date] ? '▸' : '▾';
  }

  /* ── 取得當月記帳 ── */
  function getMrs() {
    const p = vy + '-' + String(vm + 1).padStart(2, '0');
    return recs.filter(r => r.date.startsWith(p));
  }

  /* ── 切換總額顯示模式 ── */
  let totalModeTipTimer = null;
  function toggleTotalDisplay() {
    showBudgetTotal = !showBudgetTotal;
    saveMode();
    render();
    const tip = document.getElementById('totalModeTip');
    if (!tip.querySelector('span')) tip.innerHTML = '<span></span>';
    const s = tip.querySelector('span');
    s.textContent = showBudgetTotal ? '顯示：預算內' : '顯示：全部';
    s.classList.add('show');
    clearTimeout(totalModeTipTimer);
    totalModeTipTimer = setTimeout(() => s.classList.remove('show'), 1000);
  }

  /* ── 主渲染 ── */
  function render() {
    const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    document.getElementById('mLabel').textContent = vy + '．' + mn[vm];
    const mrs   = getMrs();
    const total = mrs.reduce((s, r) => s + r.amt, 0);
    const budgetTotal = mrs.reduce((s, r) => s + (r.exempt ? 0 : r.amt), 0);

    const tEl   = document.getElementById('totalAmt');
    const tNum  = document.getElementById('tNum');
    const hint  = document.getElementById('budgetHint');

    const displayTotal = showBudgetTotal ? budgetTotal : total;

    // 預算超出判斷（永遠以 budgetTotal 為準）
    if (budget > 0 && budgetTotal > budget) {
      const diff = budgetTotal - budget;
      tNum.textContent = showBudgetTotal ? ('-' + diff.toLocaleString()) : total.toLocaleString();
      tEl.classList.toggle('over', showBudgetTotal);
      hint.textContent = showBudgetTotal ? '超出上限 NT$' + budget.toLocaleString() : '⚠ 預算內已超出';
      hint.className = 'over';
    } else {
      tNum.textContent = displayTotal.toLocaleString();
      tEl.classList.remove('over');
      if (budget > 0) {
        const rem = budget - budgetTotal;
        hint.textContent = '上限 NT$' + budget.toLocaleString() + '　剩 ' + rem.toLocaleString();
        hint.className = '';
      } else {
        hint.textContent = '';
        hint.className = '';
      }
    }

    // ensure correct panel visible
    const wrap = document.getElementById('panelWrap');
    if (wrap) {
      if (ctab === 'list')     wrap.style.transform = 'translateX(0)';
      else if (ctab === 'ana') wrap.style.transform = 'translateX(-33.333%)';
      else                     wrap.style.transform = 'translateX(-66.666%)';
    }
    renderList(showBudgetTotal ? mrs.filter(r => !r.exempt) : mrs, mrs);
    renderAna(showBudgetTotal ? mrs.filter(r => !r.exempt) : mrs, displayTotal);
    renderBdgPlan();
  }

  /* ── 列表渲染 ── */
  function renderList(mrs, allMrs) {
    const lp = document.getElementById('listPanel');

    // 過濾模式：只看未關聯預算的項目 / 只看待拆帳項目
    let displayList = mrs;
    if (listFilterUnsplitOnly) {
      displayList = mrs.filter(r => r.cat === UNSPLIT_KEY && unsplitRemaining(r) > 0);
    } else if (listFilterUnlinked) {
      displayList = mrs.filter(r => !r.bdgRef || !r.bdgRef.catKey);
    }

    const filterBanner = listFilterUnsplitOnly
      ? `<div class="list-filter-banner" onclick="listFilterUnsplitOnly=false;render()">
          <span>✂️ 只顯示待拆帳項目 · 共 ${displayList.length} 筆</span>
          <span class="list-filter-close">✕ 取消</span>
        </div>`
      : listFilterUnlinked
      ? `<div class="list-filter-banner" onclick="listFilterUnlinked=false;render()">
          <span>🔍 只顯示未關聯預算的項目 · 共 ${displayList.length} 筆</span>
          <span class="list-filter-close">✕ 取消</span>
        </div>`
      : '';

    if (displayList.length === 0) {
      lp.innerHTML = filterBanner + (listFilterUnsplitOnly
        ? '<div class="empty"><div class="empty-ico">✅</div>沒有待拆帳的項目了！</div>'
        : listFilterUnlinked
        ? '<div class="empty"><div class="empty-ico">✅</div>全部項目都已關聯預算了！</div>'
        : '<div class="empty"><div class="empty-ico">🌸</div>這個月還沒有記帳</div>');
      return;
    }

    const g = {};
    displayList.forEach(r => { (g[r.date] = g[r.date] || []).push(r); });
    const dates = Object.keys(g).sort((a, b) => b.localeCompare(a));

    lp.innerHTML = filterBanner + dates.map(date => {
      const d  = new Date(date + 'T00:00:00');
      const dl = d.toLocaleDateString('zh-TW', { month: 'numeric', day: 'numeric', weekday: 'short' });
      const dt = g[date].reduce((s, r) => s + r.amt, 0);
      const isCollapsed = !!collapsed[date];

      const items = g[date].map(r => {
        const c = CATS[r.cat] || UNCATEGORIZED;
        const isUnsplit = r.cat === UNSPLIT_KEY;
        const remain = isUnsplit ? unsplitRemaining(r) : 0;
        const isDone = isUnsplit && remain <= 0;

        // icon 優先顯示已關聯的預算分類 icon
        const displayIcon = (!isUnsplit && r.bdgRef && r.bdgRef.catKey && CATS[r.bdgRef.catKey])
          ? CATS[r.bdgRef.catKey].icon
          : c.icon;
        let bdgTag = '';
        if (!isUnsplit && r.bdgRef && r.bdgRef.catKey) {
          const rc = CATS[r.bdgRef.catKey];
          const plan = bdgPlan[r.bdgRef.catKey];
          if (rc && plan) {
            const sub = r.bdgRef.subId !== undefined ? plan.subs.find(s => s.id === r.bdgRef.subId) : null;
            bdgTag = `<span class="ri-bdg-tag">${rc.icon} ${rc.lbl}${sub ? ' › '+sub.name : ''}</span>`;
          }
        }
        let unsplitTag = '';
        if (isUnsplit) {
          unsplitTag = isDone
            ? `<span class="ri-bdg-tag ri-unsplit-done">已拆分完成</span>`
            : `<span class="ri-bdg-tag ri-unsplit-tag">剩 $${remain.toLocaleString()} 未拆</span>`;
        }

        // 如果已關聯預算分類/子分類，前面不重複顯示分類文字（標籤本身已包含完整資訊），避免「圖示是B、文字卻還是A」的不一致
        const linkedCat = (!isUnsplit && r.bdgRef && r.bdgRef.catKey && CATS[r.bdgRef.catKey]) ? CATS[r.bdgRef.catKey] : null;
        const plainLbl = linkedCat ? '' : c.lbl;
        const noteFallbackLbl = linkedCat ? linkedCat.lbl : c.lbl;

        const rowAction = isUnsplit ? 'split' : 'tree';

        return `<div class="ri${r.exempt ? ' exempt-row' : ''}${isUnsplit ? ' ri-unsplit' : ''}">
          <div class="ri-ico" style="cursor:pointer" onclick="${iconClick}" title="${isUnsplit ? '點擊拆分' : '點擊關聯預算'}">${displayIcon}</div>
          <div class="ri-info"
            oncontextmenu="openEditNote(${r.id});return false"
            style="-webkit-user-select:none;user-select:none;touch-action:manipulation;cursor:pointer"
            data-action="${rowAction}"
            data-id="${r.id}"
            ontouchstart="riLongPressStart(event,this)"
            ontouchend="riLongPressEnd(event,this)"
            ontouchcancel="riLongPressCancel(this)"
            ontouchmove="riLongPressCancel(this)"
            onclick="riInfoClick(event,this)"
          >
            <div class="ri-note">${r.note ? esc(r.note) : noteFallbackLbl}</div>
            <div class="ri-cat">${plainLbl}${bdgTag}${unsplitTag}</div>
          </div>
          <div class="ri-amt${r.exempt ? ' exempt' : ''}" onclick="${isUnsplit ? `openSplitModal(${r.id})` : `toggleExempt(${r.id})`}" title="${isUnsplit ? '點擊拆分' : '點擊切換是否計入預算'}"><small>$</small>${r.amt.toLocaleString()}</div>
          <button class="ri-del" onclick="delRec(${r.id})">✕</button>
        </div>`;
      }).join('');

      return `
        <div class="dg-head" onclick="toggleDate('${date}')">
          <span><span id="da-${date}" class="dg-arrow">${isCollapsed ? '▸' : '▾'}</span> ${dl}</span>
          <span style="color:var(--roseDk);font-family:Montserrat,sans-serif;font-weight:700">$${dt.toLocaleString()}</span>
        </div>
        <div id="di-${date}" style="display:${isCollapsed ? 'none' : 'block'}">${items}</div>`;
    }).join('');
  }

  /* ── 分析展開狀態 ── */
  const anaOpen = {};

  /* ── 分析渲染 ── */
  function renderAna(mrs, total) {
    const ap = document.getElementById('anaPanel');
    if (mrs.length === 0) {
      ap.innerHTML = '<div class="ana-empty">這個月還沒有記帳 🌸</div>';
      return;
    }

    const tv = {};
    CKEYS.forEach(k => { tv[k] = 0; });
    let unsplitRemain = 0;
    let uncategorizedTotal = 0;
    mrs.forEach(r => {
      if (r.cat === UNSPLIT_KEY) {
        // 待拆帳本身不計入一般分類統計（拆出去的已是獨立紀錄，會由對應分類自行計入）
        unsplitRemain += unsplitRemaining(r);
        return;
      }
      if (CKEYS.includes(r.cat)) {
        tv[r.cat] += r.amt;
      } else {
        uncategorizedTotal += r.amt; // 分類已被刪除的舊紀錄
      }
    });

    // 本月各細分類實際花費（透過 bdgRef）— 在展開時按需計算
    const segs = CKEYS.map((k, i) => {
      const pct = total > 0 ? (tv[k] / total * 100) : 0;
      return pct > 0
        ? `<div class="stack-seg" style="width:${pct.toFixed(1)}%;background:${catColor(i)}"></div>`
        : '';
    }).join('') + (uncategorizedTotal > 0 && total > 0
      ? `<div class="stack-seg" style="width:${(uncategorizedTotal/total*100).toFixed(1)}%;background:#c9bdb5"></div>`
      : '');

    const sorted = [...CKEYS].sort((a, b) => tv[b] - tv[a]);

    const cards = sorted.map(k => {
      const i    = CKEYS.indexOf(k);
      const c    = CATS[k];
      const v    = tv[k];
      const pct  = total > 0 ? Math.round(v / total * 100) : 0;
      const plan = bdgPlan[k] || { budget: 0, subs: [] };
      const isOpen = !!anaOpen[k];

      // 細分類列表（只顯示有資料的，加上預算對比）
      let subsHtml = '';
      if (isOpen) {
        const bdgSp = getBdgSpending();
        if (plan.subs.length > 0) {
          plan.subs.forEach(s => {
            const ss    = bdgSp[k + ':' + s.id] || 0;
            const sOver = s.budget > 0 && ss > s.budget;
            const sRem  = s.budget > 0 ? s.budget - ss : null;
            subsHtml += `<div class="ana-sub-row">
              <span class="ana-sub-dot"></span>
              <span class="ana-sub-name">${esc(s.name)}</span>
              ${s.budget > 0 ? `<span class="ana-sub-budget">$${s.budget.toLocaleString()}</span>` : ''}
              <span class="ana-sub-spent${sOver?' over':''}">$${ss.toLocaleString()}</span>
              ${sRem !== null ? `<span class="ana-sub-rem${sOver?' over':''}">剩$${Math.max(0,sRem).toLocaleString()}</span>` : ''}
            </div>`;
          });
        } else {
          subsHtml = `<div class="ana-no-sub">尚未設定細分類 → 前往「預算」頁新增</div>`;
        }
      }

      return `<div class="cat-card" onclick="toggleAnaCard('${k}')" style="cursor:pointer">
        <div class="cat-card-top">
          <div class="cat-dot" style="background:${catColor(i)}"></div>
          <div class="cat-name">${c.icon} ${c.lbl}</div>
          <div class="cat-pct">${pct}%</div>
          <div class="cat-amt"><small>$</small>${v.toLocaleString()}</div>
          <span style="font-size:9px;color:var(--rose);margin-left:4px">${isOpen ? '▴' : '▾'}</span>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${pct}%;background:${catColor(i)}"></div></div>
        ${isOpen ? `<div class="ana-subs-wrap">${subsHtml}</div>` : ''}
      </div>`;
    }).join('') + (uncategorizedTotal > 0 ? `<div class="cat-card">
        <div class="cat-card-top">
          <div class="cat-dot" style="background:#c9bdb5"></div>
          <div class="cat-name">🏷️ 未分類（分類已刪除）</div>
          <div class="cat-pct">${total > 0 ? Math.round(uncategorizedTotal/total*100) : 0}%</div>
          <div class="cat-amt"><small>$</small>${uncategorizedTotal.toLocaleString()}</div>
        </div>
        <div class="bar-bg"><div class="bar-fill" style="width:${total>0?Math.round(uncategorizedTotal/total*100):0}%;background:#c9bdb5"></div></div>
      </div>` : '');

    const legend = CKEYS
      .filter(k => tv[k] > 0)
      .map(k => {
        const i = CKEYS.indexOf(k);
        return `<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${catColor(i)}"></span>
          ${CATS[k].lbl}
        </span>`;
      }).join('') + (uncategorizedTotal > 0 ? `<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--muted)">
          <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:#c9bdb5"></span>
          未分類
        </span>` : '');

    ap.innerHTML = `
      <div class="ana-total">
        <div class="ana-total-label">本月支出</div>
        <div class="ana-total-num"><small>NT$</small>${total.toLocaleString()}</div>
      </div>
      ${unsplitRemain > 0 ? `<div class="ana-unsplit-banner" onclick="goToUnsplitFilter()">
        <span>✂️ 本月待拆帳尚有 <b>$${unsplitRemain.toLocaleString()}</b> 未分配</span>
        <span class="ana-unsplit-go">前往明細 ›</span>
      </div>` : ''}
      <div class="ana-stack-wrap">
        <div class="stack-bar">${segs}</div>
        <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:2px">${legend}</div>
      </div>
      ${cards}`;
  }

  function toggleAnaCard(k) {
    anaOpen[k] = !anaOpen[k];
    const mrs = getMrs();
    const displayMrs = showBudgetTotal ? mrs.filter(r => !r.exempt) : mrs;
    const displayTotal = displayMrs.reduce((s, r) => s + r.amt, 0);
    renderAna(displayMrs, displayTotal);
  }

  /* ── Toast ── */
  let _toastTimer = null;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => el.classList.remove('show'), 2000);
  }

  /* ── 匯出 CSV ── */
  function exportCSV() {
    if (recs.length === 0) { toast('沒有資料可以匯出'); return; }
    const header = '日期,分類,金額,備註,不計入預算';
    const rows = recs.map(r => {
      const c    = CATS[r.cat] || UNCATEGORIZED;
      const note = (r.note || '').replace(/,/g, '，').replace(/\n/g, ' ');
      return `${r.date},${c.lbl},${r.amt},${note},${r.exempt ? '是' : ''}`;
    });
    const csv  = '\uFEFF' + header + '\n' + rows.join('\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const now  = new Date();
    a.href     = url;
    a.download = `記帳_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.csv`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('已匯出 CSV ↓');
  }

  /* ── 備份 JSON（完整資料） ── */
  function backupJSON() {
    const payload = {
      v: 3,
      ts: Date.now(),
      recs,
      bdgPlan,
      catsList: CATS_LIST,
      labels: (() => { try { return JSON.parse(localStorage.getItem(SK_LBL) || '{}'); } catch(e) { return {}; } })(),
    };
    const json = JSON.stringify(payload);
    const blob = new Blob([json], { type: 'application/json;charset=utf-8' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const now  = new Date();
    a.href     = url;
    a.download = `記帳備份_${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    toast('已備份 JSON ↓');
    closeBackupMenu();
  }

  /* ── Firebase 同步 ── */
  function _fbGetUserCol() {
    if (!window._fb || !window._fbUser) return null;
    return window._fb.collection(window._fb.db, 'users', window._fbUser.uid, 'recs');
  }

  async function fbSyncRec(rec) {
    try {
      const col = _fbGetUserCol();
      if (!col) return;
      const { doc, setDoc } = window._fb;
      await setDoc(doc(window._fb.db, 'users', window._fbUser.uid, 'recs', String(rec.id)), rec);
    } catch(e) {
      console.error('[FB] syncRec failed', e);
    }
  }

  async function fbDeleteRec(id) {
    try {
      if (!window._fb || !window._fbUser) return;
      const { doc, deleteDoc } = window._fb;
      await deleteDoc(doc(window._fb.db, 'users', window._fbUser.uid, 'recs', String(id)));
    } catch(e) {
      console.error('[FB] deleteRec failed', e);
    }
  }

  async function fbSyncMeta(key, value) {
    try {
      if (!window._fb || !window._fbUser) return;
      const { doc, setDoc } = window._fb;
      await setDoc(doc(window._fb.db, 'users', window._fbUser.uid, 'meta', key), { value });
    } catch(e) {
      console.error('[FB] syncMeta failed', e);
    }
  }

  async function fbLoadAll() {
    if (!window._fb || !window._fbUser) return;
    const { db, collection, getDocs, doc, getDoc } = window._fb;
    const uid = window._fbUser.uid;
    // 讀取 recs
    try {
      const snap = await getDocs(collection(db, 'users', uid, 'recs'));
      if (!snap.empty) {
        recs = snap.docs.map(d => d.data());
        recs.sort((a, b) => b.id - a.id);
      }
    } catch(e) { console.error('[FB] loadRecs failed', e); }
    // 讀取 meta（分類、預算等）
    const metaKeys = [SK_CATS, SK_BDG, SK_MODE, SK_BDGPLAN];
    for (const k of metaKeys) {
      try {
        const snap = await getDoc(doc(db, 'users', uid, 'meta', k));
        if (snap.exists()) {
          const v = snap.data().value;
          if (k === SK_CATS) {
            const saved = JSON.parse(v);
            if (Array.isArray(saved) && saved.length > 0) CATS_LIST = saved;
          } else if (k === SK_BDG) {
            budget = parseInt(v, 10) || 0;
          } else if (k === SK_MODE) {
            showBudgetTotal = (v === '1');
          } else if (k === SK_BDGPLAN) {
            const saved = JSON.parse(v);
            if (typeof saved === 'object' && !Array.isArray(saved)) {
              bdgPlan = saved;
              Object.values(bdgPlan).forEach(p => {
                (p.subs||[]).forEach(s => { if (s.id >= _subId) _subId = s.id + 1; });
              });
            }
          }
        }
      } catch(e) { console.error('[FB] loadMeta failed', k, e); }
    }
  }

  /* ── 還原 JSON ── */
  function restoreJSON() {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = async e => {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const data = JSON.parse(text);
        if (!data.recs || !Array.isArray(data.recs)) throw new Error('格式錯誤');
        // 確認
        const ok = confirm(`還原備份？\n共 ${data.recs.length} 筆記錄\n備份時間：${data.ts ? new Date(data.ts).toLocaleString() : '未知'}\n\n備份資料將與雲端合併，兩邊記錄都會保留。`);
        if (!ok) return;

        // 先從 Firebase 載入雲端最新資料
        toast('☁️ 正在讀取雲端資料…');
        await fbLoadAll();

        // 合併：以 id 為 key，雲端優先（雲端是最新的），備份檔補上雲端沒有的
        const merged = new Map();
        recs.forEach(r => merged.set(r.id, r));         // 先放雲端資料
        data.recs.forEach(r => {
          if (!merged.has(r.id)) merged.set(r.id, r);   // 備份檔只補雲端沒有的
        });
        recs = [...merged.values()].sort((a, b) => b.id - a.id);

        if (data.bdgPlan && typeof data.bdgPlan === 'object') bdgPlan = data.bdgPlan;
        if (Array.isArray(data.catsList) && data.catsList.length > 0) CATS_LIST = data.catsList;
        rebuildCats();
        if (CKEYS.length > 0 && !CKEYS.includes(cat)) cat = CKEYS[0];
        initBdgPlan();

        // 用比所有現有 id 都大的值當 _nextId，避免衝突
        _nextId = recs.length > 0
          ? Math.max(Date.now(), Math.max(...recs.map(r => r.id)) + 1)
          : Date.now();

        save();
        saveBdgPlan();
        saveCats();
        renderCatBtns();
        render();
        closeBackupMenu();

        // 批次上傳所有 recs 到 Firebase，顯示即時進度
        const total = recs.length;
        let uploaded = 0;
        for (const r of recs) {
          await fbSyncRec(r);
          uploaded++;
          // 每 5 筆或最後一筆更新一次 toast，避免更新過於頻繁
          if (uploaded % 5 === 0 || uploaded === total) {
            toast(`⏫ 同步中… ${uploaded} / ${total} 筆`);
          }
        }
        await fbSyncMeta(SK_BDGPLAN, JSON.stringify(bdgPlan));
        await fbSyncMeta(SK_CATS, JSON.stringify(CATS_LIST));
        toast('✅ 已合併並同步 ' + uploaded + ' 筆到 Firebase');
      } catch(err) {
        toast('❌ 還原失敗：' + err.message);
      }
    };
    input.click();
  }

  /* ── 備份選單 ── */
  function openBackupMenu() {
    const el = document.getElementById('backupMenuOverlay');
    el.style.display = 'flex';
  }
  function closeBackupMenu() {
    document.getElementById('backupMenuOverlay').style.display = 'none';
  }

  /* ── Month Picker ── */
  let mpYear = 0;

  function openMonthPicker() {
    mpYear = vy;
    renderMpYear();
    document.getElementById('monthPickerOverlay').classList.add('open');
  }

  function closeMp() {
    document.getElementById('monthPickerOverlay').classList.remove('open');
  }

  function renderMpYear() {
    document.getElementById('mpYearLabel').textContent = mpYear;
    const grid = document.getElementById('mpMonthGrid');
    const mn = ['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
    grid.innerHTML = mn.map((n, i) => {
      const on = (mpYear === vy && i === vm) ? ' on' : '';
      return `<button class="mp-m${on}" onclick="selectYM(${i})">${n}</button>`;
    }).join('');
  }

  function selectYM(m) {
    const prevVm = vm, prevVy = vy;
    vy = mpYear; vm = m;
    collapsed = {};
    Object.keys(anaOpen).forEach(k => delete anaOpen[k]);
    closeMp();
    const direction = (vy > prevVy || (vy === prevVy && vm > prevVm)) ? 1 : -1;
    const cls = direction > 0 ? 'slide-in-right' : 'slide-in-left';
    render();
    const panel = ctab === 'list' ? document.getElementById('listPanel') : document.getElementById('anaPanel');
    panel.classList.remove('slide-in-left', 'slide-in-right');
    void panel.offsetWidth;
    panel.classList.add(cls);
    setTimeout(() => panel.classList.remove(cls), 300);
  }

  /* ── Swipe on scroll area ── */
  function setupSwipe() {
    const area = document.getElementById('scrollArea');
    const tabOrder = ['list', 'ana', 'bdgplan'];
    let sx = 0, sy = 0, tracking = false;

    area.addEventListener('touchstart', e => {
      sx = e.touches[0].clientX;
      sy = e.touches[0].clientY;
      tracking = true;
    }, { passive: true });

    area.addEventListener('touchend', e => {
      if (!tracking) return;
      tracking = false;
      const dx = e.changedTouches[0].clientX - sx;
      const dy = e.changedTouches[0].clientY - sy;
      if (Math.abs(dx) < 30 || Math.abs(dy) > Math.abs(dx)) return;
      const idx = tabOrder.indexOf(ctab);
      if (dx < 0 && idx < tabOrder.length - 1) goTab(tabOrder[idx + 1]);
      else if (dx > 0 && idx > 0) goTab(tabOrder[idx - 1]);
    }, { passive: true });

    area.addEventListener('touchcancel', () => { tracking = false; }, { passive: true });
  }

  /* ── Swipe on top bar for month ── */
  function setupMonthSwipe() {
    const top = document.getElementById('top');
    let sx = 0, moved = false, blocked = false;

    top.addEventListener('touchstart', e => {
      // 不在 totalAmt 區塊才允許月份滑動
      blocked = false;
      sx = e.touches[0].clientX;
      moved = false;
    }, { passive: true });

    top.addEventListener('touchmove', e => { moved = true; }, { passive: true });

    top.addEventListener('touchend', e => {
      if (!moved || blocked) { blocked = false; return; }
      const dx = e.changedTouches[0].clientX - sx;
      if (Math.abs(dx) < 40) return;
      chM(dx < 0 ? 1 : -1);
    }, { passive: true });

    top.addEventListener('touchcancel', () => { blocked = false; moved = false; }, { passive: true });
  }

  // PWA 生命週期：切換 App 或回桌面時強制寫入，防止 iOS 背景砍掉導致資料遺失
  document.addEventListener('visibilitychange', () => {
    if (document.visibilityState === 'hidden') {
      save(); saveCats(); saveBdgPlan();
    }
  });

  // 關閉分頁前最後寫入（補強 visibilitychange）
  window.addEventListener('beforeunload', () => {
    save(); saveCats(); saveBdgPlan();
  });

  init();
</script>
